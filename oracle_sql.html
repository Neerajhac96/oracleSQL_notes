truncate rename comment constraint not null unique primary key foreign key check default table level column level implicit commit","blocks":[{"type":"sec","title":"What are DDL Commands?","items":[{"type":"prose","text":"DDL stands for <strong>Data Definition Language</strong>. DDL commands perform an <strong>implicit COMMIT</strong> — changes cannot be rolled back!"},{"type":"list","items":["CREATE — Create new objects","ALTER — Modify existing objects","DROP — Remove objects","TRUNCATE — Remove all rows","RENAME — Rename objects","COMMENT — Add descriptions"]}]},{"type":"sec","title":"Constraints Introduction","items":[{"type":"prose","text":"Constraints <strong>enforce rules</strong> on data. Types: NOT NULL, UNIQUE, PRIMARY KEY, FOREIGN KEY, CHECK, DEFAULT."}]},{"type":"sec","title":"NOT NULL Constraint","items":[{"type":"code","text":"-- Column cannot contain NULL value:\nCREATE TABLE EMPLOYEE(\n    EMP_ID NUMBER,\n    NAME   VARCHAR2(50) NOT NULL   -- NULL not allowed!\n);\n\n-- Valid: INSERT INTO EMPLOYEE VALUES(101, 'RAM');  ✓\n-- Invalid: INSERT INTO EMPLOYEE(EMP_ID) VALUES(101); ← ERROR!\n-- ORA-01400: cannot insert NULL into (EMPLOYEE.NAME)"}]},{"type":"sec","title":"UNIQUE Constraint","items":[{"type":"code","text":"-- Prevents duplicate values (NULL IS allowed):\nCREATE TABLE EMPLOYEE(\n    EMAIL VARCHAR2(50) UNIQUE\n);\n\n-- Valid:\n-- a@gmail.com ✓\n-- b@gmail.com ✓\n-- Invalid:\n-- a@gmail.com (duplicate) ✗\n\n-- Note: Multiple NULL values ARE allowed in UNIQUE columns"}]},{"type":"sec","title":"PRIMARY KEY","items":[{"type":"prose","text":"PRIMARY KEY = <strong>UNIQUE + NOT NULL</strong>. Each table should have ONE primary key."},{"type":"code","text":"CREATE TABLE EMPLOYEE(\n    EMP_ID NUMBER PRIMARY KEY,   -- Column level\n    NAME   VARCHAR2(50)\n);\n\n-- Valid:   101, 102, 103\n-- Invalid: 101 (duplicate) ✗\n-- Invalid: NULL ✗\n\n-- Composite Primary Key (multiple columns together):\nCREATE TABLE STUDENT_COURSE(\n    STUDENT_ID NUMBER,\n    COURSE_ID  NUMBER,\n    PRIMARY KEY(STUDENT_ID, COURSE_ID)  -- Table level\n);\n-- Valid:   1,101 and 1,102 and 2,101\n-- Invalid: 1,101 again (composite key duplicate) ✗"}]},{"type":"sec","title":"FOREIGN KEY","items":[{"type":"prose","text":"Maintains <strong>parent-child relationship</strong> between tables."},{"type":"code","text":"-- Parent table (referenced):\nCREATE TABLE DEPARTMENT(\n    DEPT_ID   NUMBER PRIMARY KEY,\n    DEPT_NAME VARCHAR2(30)\n);\n-- Data: 10 IT, 20 HR\n\n-- Child table (references parent):\nCREATE TABLE EMPLOYEE(\n    EMP_ID  NUMBER PRIMARY KEY,\n    NAME    VARCHAR2(50),\n    DEPT_ID NUMBER,\n    FOREIGN KEY(DEPT_ID) REFERENCES DEPARTMENT(DEPT_ID)\n);\n\n-- Valid:   INSERT INTO EMPLOYEE VALUES(101,'RAM',10);  ✓\n-- Invalid: INSERT INTO EMPLOYEE VALUES(102,'MOHAN',50); ✗\n-- Department 50 does not exist in DEPARTMENT table!"}]},{"type":"sec","title":"CHECK Constraint","items":[{"type":"code","text":"-- Restricts values using a condition:\nCREATE TABLE EMPLOYEE(\n    AGE    NUMBER CHECK(AGE >= 18),\n    GENDER CHAR(1) CHECK(GENDER IN ('M','F'))\n);\n\n-- Valid:   AGE = 25 ✓\n-- Invalid: AGE = 16 ✗ (below 18)\n-- Valid:   GENDER = 'M' ✓\n-- Invalid: GENDER = 'X' ✗"}]},{"type":"sec","title":"DEFAULT Value","items":[{"type":"code","text":"-- Automatically assigns a value if not supplied:\nCREATE TABLE EMPLOYEE(\n    STATUS VARCHAR2(20) DEFAULT 'ACTIVE'\n);\n\n-- Insert without STATUS:\nINSERT INTO EMPLOYEE(EMP_ID) VALUES(101);\n-- STATUS automatically becomes: 'ACTIVE'"}]},{"type":"sec","title":"Named Constraints (Table Level)","items":[{"type":"code","text":"-- Named constraints: easier to manage, better error messages\nCREATE TABLE EMPLOYEE(\n    EMP_ID  NUMBER       CONSTRAINT EMP_PK PRIMARY KEY,\n    NAME    VARCHAR2(50) CONSTRAINT EMP_NAME_NN NOT NULL,\n    EMAIL   VARCHAR2(100) CONSTRAINT EMP_EMAIL_UK UNIQUE,\n    AGE     NUMBER       CONSTRAINT EMP_AGE_CHK CHECK(AGE >= 18),\n    STATUS  VARCHAR2(20) DEFAULT 'ACTIVE',\n    DEPT_ID NUMBER,\n    CONSTRAINT EMP_DEPT_FK\n        FOREIGN KEY(DEPT_ID) REFERENCES DEPARTMENT(DEPT_ID)\n);"}]},{"type":"sec","title":"ALTER TABLE","items":[{"type":"code","text":"-- Add column:\nALTER TABLE EMPLOYEE ADD PHONE VARCHAR2(15);\n\n-- Modify column (change size or type):\nALTER TABLE EMPLOYEE MODIFY NAME VARCHAR2(100);\n\n-- Drop column:\nALTER TABLE EMPLOYEE DROP COLUMN PHONE;\n\n-- Add constraint:\nALTER TABLE EMPLOYEE\nADD CONSTRAINT EMP_UK UNIQUE(EMAIL);\n\n-- Drop constraint:\nALTER TABLE EMPLOYEE DROP CONSTRAINT EMP_UK;\n\n-- Disable / Enable constraint:\nALTER TABLE EMPLOYEE DISABLE CONSTRAINT EMP_AGE_CHK;\nALTER TABLE EMPLOYEE ENABLE  CONSTRAINT EMP_AGE_CHK;\n\n-- Rename table:\nRENAME EMPLOYEE TO EMP;"}]},{"type":"sec","title":"TRUNCATE TABLE","items":[{"type":"code","text":"-- Deletes ALL rows, structure remains:\nTRUNCATE TABLE EMPLOYEE;\n\n-- Before:\n-- | 101 | RAM   |\n-- | 102 | MOHAN |\n-- After TRUNCATE: empty table\n\n-- Characteristics:\n-- • Removes all rows\n-- • Structure remains (columns, constraints)\n-- • CANNOT rollback (implicit COMMIT!)\n-- • FASTER than DELETE"},{"type":"warn","text":"TRUNCATE cannot be rolled back!"}]},{"type":"sec","title":"DROP TABLE","items":[{"type":"code","text":"-- Removes everything: data + structure + constraints\nDROP TABLE EMPLOYEE;\n-- Table no longer exists!\n\n-- COMMENT on table/column:\nCOMMENT ON TABLE EMPLOYEE IS 'Stores employee information';\nCOMMENT ON COLUMN EMPLOYEE.SALARY IS 'Monthly salary';"}]},{"type":"sec","title":"DELETE vs TRUNCATE vs DROP","items":[{"type":"table","data":{"h":["Feature","DELETE","TRUNCATE","DROP"],"r":[["Removes rows","Yes","Yes","Yes"],["Removes structure","No","No","Yes"],["WHERE allowed","Yes","No","No"],["Rollback possible","Yes","No","No"],["Implicit COMMIT","No","Yes","Yes"],["Speed","Slow","Fast","Fast"]]}}]},{"type":"sec","title":"Constraint Check Order (INSERT)","items":[{"type":"prose","text":"When inserting data, Oracle checks constraints in this order:"},{"type":"dbox","text":"NOT NULL\n   ↓\nCHECK\n   ↓\nUNIQUE\n   ↓\nPRIMARY KEY\n   ↓\nFOREIGN KEY\n   ↓\nInsert row"}]},{"type":"rev","items":[{"l":"NOT NULL","c":"Value zaroori"},{"l":"UNIQUE","c":"No duplicates (NULL ok)"},{"l":"PRIMARY KEY","c":"UNIQUE + NOT NULL"},{"l":"FOREIGN KEY","c":"References parent"},{"l":"CHECK","c":"Custom condition"},{"l":"DEFAULT","c":"Automatic value"},{"l":"ALTER ADD","c":"ALTER TABLE t ADD col type"},{"l":"ALTER MODIFY","c":"MODIFY col newtype"},{"l":"TRUNCATE","c":"All rows gone, no rollback"},{"l":"DROP","c":"Table completely gone"}]},{"type":"prac","items":["STUDENT table with PRIMARY KEY","DEPARTMENT aur EMPLOYEE with FOREIGN KEY","EMAIL column add karo using ALTER","UNIQUE constraint on EMAIL","CHECK constraint: AGE > 18","DEFAULT STATUS = 'ACTIVE'","Composite primary key example","DROP vs TRUNCATE difference explain karo"]}]},{"id":15,"cat":"DML & TCL","title":"DML Commands and Transactions (Deep Dive)","search":"update delete merge commit rollback savepoint transaction acid atomicity insert dml tcl implicit auto-commit bank transfer","blocks":[{"type":"sec","title":"What is DML?","items":[{"type":"prose","text":"DML = <strong>Data Manipulation Language</strong>. Used to insert, update, delete, and merge data. DML statements do <strong>NOT auto-commit</strong> — you must explicitly COMMIT."},{"type":"list","items":["INSERT — Add new rows","UPDATE — Modify existing rows","DELETE — Remove specific rows","MERGE — Insert or Update (Upsert)"]}]},{"type":"sec","title":"UPDATE Statement","items":[{"type":"table","data":{"h":["EMP_ID","NAME","SALARY","DEPT"],"r":[["101","RAM","50000","IT"],["102","SHYAM","45000","HR"],["103","MOHAN","60000","IT"]]}},{"type":"code","text":"-- Syntax:\nUPDATE table_name\nSET column1 = value1, column2 = value2,...\nWHERE condition;\n\n-- Update single column:\nUPDATE EMPLOYEE\nSET SALARY = 55000\nWHERE EMP_ID = 101;\n-- RAM's salary: 50000 → 55000\n\n-- Update multiple columns:\nUPDATE EMPLOYEE\nSET SALARY = 50000, NAME = 'RAM KUMAR'\nWHERE EMP_ID = 101;\n\n-- Update ALL rows (no WHERE):\nUPDATE EMPLOYEE SET SALARY = SALARY + 5000;\n-- Everyone gets 5000 increment"},{"type":"warn","text":"Forgetting WHERE clause updates ALL rows! Always double-check with SELECT first."},{"type":"code","text":"-- Subquery in UPDATE:\nUPDATE EMPLOYEE\nSET SALARY = SALARY * 1.10\nWHERE SALARY < (SELECT AVG(SALARY) FROM EMPLOYEE);\n-- Only employees below average get a 10% raise"}]},{"type":"sec","title":"DELETE Statement","items":[{"type":"code","text":"-- Syntax:\nDELETE FROM table_name WHERE condition;\n\n-- Delete specific row:\nDELETE FROM EMPLOYEE WHERE EMP_ID = 102;\n-- SHYAM removed\n\n-- Delete with condition:\nDELETE FROM EMPLOYEE WHERE SALARY < 45000;\n\n-- Delete ALL rows (no WHERE):\nDELETE FROM EMPLOYEE;\n-- Table is now empty (but structure remains)\n-- This CAN be rolled back (unlike TRUNCATE)\n\n-- Subquery in DELETE:\nDELETE FROM EMPLOYEE\nWHERE DEPT_ID NOT IN\n(\n    SELECT DEPT_ID FROM DEPARTMENT\n);\n-- Remove employees with invalid department"}]},{"type":"sec","title":"MERGE Statement (Upsert)","items":[{"type":"prose","text":"MERGE combines INSERT and UPDATE. If data exists → UPDATE. If not → INSERT."},{"type":"table","data":{"h":["EMP_ID","NAME","SALARY"],"r":[["101","RAM","50000"],["103","SHYAM","45000"]]}},{"type":"prose","text":"EMPLOYEE table (target) ↑"},{"type":"table","data":{"h":["EMP_ID","NAME","SALARY"],"r":[["102","MOHAN","65000"],["103","SHYAM","55000"]]}},{"type":"prose","text":"NEW_EMPLOYEE table (source) ↑"},{"type":"code","text":"MERGE INTO EMPLOYEE E\nUSING NEW_EMPLOYEE N\nON (E.EMP_ID = N.EMP_ID)\nWHEN MATCHED THEN\n    UPDATE SET E.SALARY = N.SALARY\nWHEN NOT MATCHED THEN\n    INSERT VALUES(N.EMP_ID, N.NAME, N.SALARY);\n\n-- Logic:\n-- EMP_ID 102: NOT in EMPLOYEE → INSERT MOHAN\n-- EMP_ID 103: MATCHED → UPDATE SHYAM salary 45000→55000\n\n-- Result:\n-- | 101 | RAM   | 50000 |  ← unchanged\n-- | 102 | MOHAN | 65000 |  ← new (inserted)\n-- | 103 | SHYAM | 55000 |  ← updated"}]},{"type":"sec","title":"Transactions — COMMIT, ROLLBACK, SAVEPOINT","items":[{"type":"prose","text":"A <strong>transaction</strong> is a group of SQL statements that work as a unit. Either ALL succeed or NONE should."},{"type":"code","text":"-- COMMIT: permanently save all changes\nINSERT INTO EMPLOYEE VALUES(101,'RAM',50000,'IT');\nINSERT INTO EMPLOYEE VALUES(102,'MOHAN',60000,'HR');\nCOMMIT;  -- Both rows permanently saved\n\n-- ROLLBACK: undo all uncommitted changes\nDELETE FROM EMPLOYEE WHERE EMP_ID = 101;\n-- Oops! Changed your mind:\nROLLBACK;  -- Row 101 comes back!"},{"type":"code","text":"-- SAVEPOINT: create a checkpoint\nINSERT INTO EMPLOYEE VALUES(101,'RAM',50000,'IT');\nSAVEPOINT point_a;\n\nINSERT INTO EMPLOYEE VALUES(102,'MOHAN',60000,'HR');\nSAVEPOINT point_b;\n\nINSERT INTO EMPLOYEE VALUES(103,'SHYAM',45000,'IT');\n-- Current state: 101, 102, 103 in table\n\nROLLBACK TO point_b;\n-- Undo: row 103 removed\n-- Current state: 101, 102 remain\n\nCOMMIT;\n-- 101 and 102 permanently saved"}]},{"type":"sec","title":"Implicit COMMIT (DDL Warning!)","items":[{"type":"code","text":"-- DDL statements cause implicit COMMIT!\nINSERT INTO EMPLOYEE VALUES(101,'RAM',50000,'IT');\n-- Now DDL:\nCREATE TABLE TEST(ID NUMBER);\n-- Oracle AUTOMATICALLY commits the INSERT above!\n-- Now ROLLBACK cannot undo the INSERT!"},{"type":"warn","text":"DDL commands (CREATE, ALTER, DROP, TRUNCATE) auto-commit all pending DML changes. There is NO way to rollback."}]},{"type":"sec","title":"Bank Transfer — Real World Example","items":[{"type":"code","text":"-- Transfer ₹1000 from Account 101 to Account 102\nUPDATE ACCOUNT SET BALANCE = BALANCE - 1000 WHERE ACC_NO = 101;\nUPDATE ACCOUNT SET BALANCE = BALANCE + 1000 WHERE ACC_NO = 102;\nCOMMIT;\n-- Both saved together\n\n-- If system crashes between the two updates:\nROLLBACK;\n-- Neither debit nor credit happens — money is safe!"}]},{"type":"sec","title":"ACID Properties","items":[{"type":"prose","text":"Transactions follow ACID properties:"},{"type":"list","items":["<strong>A — Atomicity:</strong> All statements succeed or none. No partial execution.","<strong>C — Consistency:</strong> Database always stays in a valid state.","<strong>I — Isolation:</strong> Transactions don't interfere with each other.","<strong>D — Durability:</strong> Committed data survives system crashes."]}]},{"type":"sec","title":"DML vs DDL Summary","items":[{"type":"table","data":{"h":["Feature","DML (INSERT/UPDATE/DELETE)","DDL (CREATE/ALTER/DROP)"],"r":[["Auto-COMMIT","No","Yes"],["Rollback possible","Yes","No"],["Affects","Data (rows)","Structure"],["Transaction control","Yes (COMMIT/ROLLBACK)","No"]]}}]},{"type":"rev","items":[{"l":"UPDATE","c":"UPDATE t SET col=val WHERE..."},{"l":"DELETE","c":"DELETE FROM t WHERE..."},{"l":"MERGE","c":"INSERT + UPDATE combined"},{"l":"COMMIT","c":"Permanently save"},{"l":"ROLLBACK","c":"Undo uncommitted"},{"l":"SAVEPOINT","c":"Create checkpoint"},{"l":"Implicit COMMIT","c":"DDL auto-commits DML"},{"l":"ACID","c":"Atomicity Consistency Isolation Durability"}]},{"type":"prac","items":["Employee 101 ki salary update karo","Sab employees ko 10% hike do","Employee 102 delete karo, phir ROLLBACK karo","SAVEPOINT use karke partial rollback karo","MERGE use karke update+insert ek saath","Bank transfer example likhna","DDL ke baad rollback possible hai? Why?","DELETE vs TRUNCATE vs DROP difference"]}]},{"id":16,"cat":"Views & Objects","title":"Views, Sequences, Synonyms & Indexes","search":"view create virtual table sequence synonym index nextval currval cache cycle maxvalue increment with check option read only b-tree performance","blocks":[{"type":"sec","title":"What is a View?","items":[{"type":"prose","text":"A view is a <strong>virtual table</strong> that stores a SELECT query. The data is NOT physically stored — it is fetched from the underlying base table(s) when you query the view."},{"type":"dbox","text":"EMPLOYEE table (real data)\n       ↓\n   VIEW (stored query)\n       ↓\nUser sees result (virtual table)"},{"type":"prose","text":"Think of a view like a window — you see the data through it, but the data lives in the actual table."}]},{"type":"sec","title":"Creating a Simple View","items":[{"type":"code","text":"-- Simple View: single table:\nCREATE VIEW EMP_VIEW AS\nSELECT EMP_ID, NAME FROM EMPLOYEE;\n\n-- Use the view:\nSELECT * FROM EMP_VIEW;\n-- | 101 | RAM   |\n-- | 102 | SHYAM |\n-- | 103 | MOHAN |\n\n-- View is just a stored query:\n-- SELECT * FROM EMP_VIEW\n-- → internally: SELECT EMP_ID, NAME FROM EMPLOYEE\n\n-- Drop view:\nDROP VIEW EMP_VIEW;\n-- Underlying EMPLOYEE table is NOT affected"}]},{"type":"sec","title":"Complex View with JOIN","items":[{"type":"code","text":"-- View joining multiple tables:\nCREATE VIEW EMP_DEPT_VIEW AS\nSELECT E.NAME, D.DEPT_NAME\nFROM EMPLOYEE E\nJOIN DEPARTMENT D ON E.DEPT_ID = D.DEPT_ID;\n\n-- Use it:\nSELECT * FROM EMP_DEPT_VIEW;\n-- | RAM   | IT |\n-- | SHYAM | HR |\n\n-- OR REPLACE: update existing view without dropping:\nCREATE OR REPLACE VIEW EMP_VIEW AS\nSELECT EMP_ID, NAME, SALARY FROM EMPLOYEE;\n-- View is updated safely"}]},{"type":"sec","title":"WITH CHECK OPTION","items":[{"type":"code","text":"-- Ensure view condition is always satisfied during DML:\nCREATE VIEW IT_EMPLOYEE AS\nSELECT * FROM EMPLOYEE WHERE DEPT_ID = 10\nWITH CHECK OPTION;\n\n-- This is OK:\nINSERT INTO IT_EMPLOYEE VALUES(105,'RAVI',55000,10);  -- DEPT_ID=10 ✓\n\n-- This fails:\nINSERT INTO IT_EMPLOYEE VALUES(106,'AMIT',60000,20);\n-- ORA-01402: view WITH CHECK OPTION where-clause violation\n-- DEPT_ID=20 violates the view condition"}]},{"type":"sec","title":"WITH READ ONLY","items":[{"type":"code","text":"-- Prevent INSERT, UPDATE, DELETE through the view:\nCREATE VIEW EMP_READONLY AS\nSELECT * FROM EMPLOYEE\nWITH READ ONLY;\n\n-- Reading is allowed:\nSELECT * FROM EMP_READONLY;  -- OK ✓\n\n-- DML is blocked:\nINSERT INTO EMP_READONLY VALUES(107,'TEST',50000,10);\n-- ORA-42399: cannot perform a DML operation on a read-only view"}]},{"type":"sec","title":"Why Use Views?","items":[{"type":"list","items":["<strong>Security:</strong> Hide sensitive columns (e.g., salary) from certain users.","<strong>Simplicity:</strong> Complex queries get a simple name.","<strong>Reusability:</strong> Same query used many times without rewriting.","<strong>Maintenance:</strong> Fix query in one place, affects all users."]}]},{"type":"sec","title":"What is a Sequence?","items":[{"type":"prose","text":"A sequence is a database object that <strong>generates unique numbers automatically</strong>. Used for primary keys, invoice numbers, order IDs."}]},{"type":"sec","title":"Creating and Using Sequences","items":[{"type":"code","text":"-- Create sequence:\nCREATE SEQUENCE EMP_SEQ\n    START WITH 1         -- starting value\n    INCREMENT BY 1       -- step size\n    MAXVALUE 999999      -- maximum value\n    NOCYCLE;             -- don't restart after max\n\n-- NEXTVAL: get next number\nSELECT EMP_SEQ.NEXTVAL FROM DUAL;  -- 1\nSELECT EMP_SEQ.NEXTVAL FROM DUAL;  -- 2\nSELECT EMP_SEQ.NEXTVAL FROM DUAL;  -- 3\n\n-- CURRVAL: get current value (must call NEXTVAL first):\nSELECT EMP_SEQ.CURRVAL FROM DUAL;  -- 3\n\n-- Use in INSERT:\nINSERT INTO EMPLOYEE VALUES(EMP_SEQ.NEXTVAL,'RAM',50000,10);\nINSERT INTO EMPLOYEE VALUES(EMP_SEQ.NEXTVAL,'MOHAN',60000,20);\n-- EMP_ID auto assigned: 4, 5, 6...\n\n-- CYCLE: restart after max\nCREATE SEQUENCE TEST_SEQ START WITH 1 MAXVALUE 3 CYCLE;\n-- Values: 1, 2, 3, 1, 2, 3, 1...\n\n-- CACHE: pre-generate numbers in memory (faster)\nCREATE SEQUENCE FAST_SEQ START WITH 1 CACHE 20;\n-- 20 values pre-generated in memory"}]},{"type":"sec","title":"Sequence Examples","items":[{"type":"code","text":"-- Custom step:\nCREATE SEQUENCE EMP_SEQ\n    START WITH 100\n    INCREMENT BY 5\n    MAXVALUE 1000\n    NOCYCLE;\n-- Values: 100, 105, 110, 115...\n\n-- Using sequence for invoice numbers:\nCREATE SEQUENCE INVOICE_SEQ\n    START WITH 1001\n    INCREMENT BY 1\n    MAXVALUE 9999\n    NOCYCLE;\n\nINSERT INTO INVOICE VALUES(INVOICE_SEQ.NEXTVAL, SYSDATE, 5000);"}]},{"type":"sec","title":"What is a Synonym?","items":[{"type":"prose","text":"A synonym is an <strong>alternate name (alias)</strong> for a database object. Used to simplify long object names and provide access to objects in other schemas."},{"type":"code","text":"-- Access HR.EMPLOYEE using just EMP:\nCREATE SYNONYM EMP FOR HR.EMPLOYEE;\nSELECT * FROM EMP;  -- works same as: SELECT * FROM HR.EMPLOYEE\n\n-- Public Synonym (accessible by all users):\nCREATE PUBLIC SYNONYM EMP FOR HR.EMPLOYEE;\n\n-- Drop synonym:\nDROP SYNONYM EMP;\n\n-- Why use synonyms?\n-- Long table: HUMAN_RESOURCES.EMPLOYEE_DETAILS → Synonym: EMP\n-- Other schema access without typing schema name every time"}]},{"type":"sec","title":"What is an Index?","items":[{"type":"prose","text":"An index is a <strong>database structure that improves query performance</strong>. Like the index of a book — it helps Oracle find data faster without scanning the entire table."},{"type":"dbox","text":"WITHOUT INDEX:\nSELECT * FROM EMPLOYEE WHERE EMP_ID = 101;\n→ Oracle scans ALL rows (Full Table Scan) → Slow!\n\nWITH INDEX:\n→ Oracle uses index tree to find 101 directly → Fast!"}]},{"type":"sec","title":"Creating Indexes","items":[{"type":"code","text":"-- Simple Index:\nCREATE INDEX EMP_IDX ON EMPLOYEE(EMP_ID);\n\n-- Unique Index (no duplicate values):\nCREATE UNIQUE INDEX EMP_MAIL_IDX ON EMPLOYEE(EMAIL);\n\n-- Composite Index (multiple columns):\nCREATE INDEX EMP_DEPT_IDX ON EMPLOYEE(DEPT_ID, SALARY);\n-- Best for queries like:\n-- WHERE DEPT_ID = 10 AND SALARY > 50000\n\n-- Drop index:\nDROP INDEX EMP_IDX;\n\n-- View indexes:\nSELECT * FROM USER_INDEXES WHERE TABLE_NAME = 'EMPLOYEE';"}]},{"type":"sec","title":"Index Advantages & Disadvantages","items":[{"type":"table","data":{"h":["Advantage","Disadvantage"],"r":[["SELECT queries much faster","INSERT is slower (index updated)"],["JOIN performance better","UPDATE is slower"],["ORDER BY faster","Extra disk space needed"],["WHERE conditions fast","Too many indexes slow DML"]]}},{"type":"info","text":"<strong>When to use index:</strong> High-cardinality columns (many unique values like EMP_ID, EMAIL). Columns frequently used in WHERE, JOIN, ORDER BY. <strong>Avoid indexing:</strong> Small tables, columns with few distinct values (GENDER, STATUS)."}]},{"type":"sec","title":"How Oracle Uses Indexes Internally","items":[{"type":"prose","text":"Oracle uses a <strong>B-Tree (Balanced Tree)</strong> structure for indexes. B-Tree search is O(log n) — much faster than full table scan O(n) for large tables."},{"type":"dbox","text":"B-TREE INDEX on SALARY:\n\n              [50000]\n             /        \\\n        [40000]      [60000]\n        /    \\        /    \\\n    [30000][45000] [55000][70000]\n\nSearching for 55000:\n  → 55000 > 50000 → right\n  → 55000 < 60000 → left\n  → Found! (only 3 comparisons vs scanning all rows)"}]},{"type":"sec","title":"Summary — All Objects","items":[{"type":"table","data":{"h":["Object","Purpose","Created With"],"r":[["Table","Store data","CREATE TABLE"],["View","Virtual table (stored query)","CREATE VIEW"],["Sequence","Auto-generate unique numbers","CREATE SEQUENCE"],["Synonym","Alternate name for object","CREATE SYNONYM"],["Index","Speed up queries","CREATE INDEX"]]}}]},{"type":"rev","items":[{"l":"CREATE VIEW","c":"AS SELECT ... FROM ..."},{"l":"OR REPLACE","c":"Update existing view"},{"l":"CHECK OPTION","c":"Enforce view condition"},{"l":"READ ONLY","c":"Block DML on view"},{"l":"NEXTVAL","c":"SEQ_NAME.NEXTVAL"},{"l":"CURRVAL","c":"SEQ_NAME.CURRVAL"},{"l":"CYCLE","c":"Restart after MAXVALUE"},{"l":"CACHE","c":"Pre-generate values"},{"l":"SYNONYM","c":"CREATE SYNONYM a FOR b"},{"l":"INDEX","c":"CREATE INDEX ON t(col)"},{"l":"B-Tree","c":"O(log n) search"},{"l":"Full scan","c":"O(n) - no index"}]},{"type":"prac","items":["Employee names aur departments ka view banao","Read-only view create karo","WITH CHECK OPTION view mein wrong dept insert karo","Sequence: START WITH 100, INCREMENT BY 5","NEXTVAL aur CURRVAL demonstrate karo","Sequence se INSERT karo","SYNONYM banao for a table","Salary column pe index banao","Index ke advantages kya hain?","B-Tree structure explain karo"]}]}];

function hlCode(c){
  const kw=/\b(SELECT|FROM|WHERE|AND|OR|NOT|IN|BETWEEN|LIKE|ORDER|BY|ASC|DESC|GROUP|HAVING|JOIN|INNER|LEFT|RIGHT|FULL|OUTER|CROSS|NATURAL|ON|AS|DISTINCT|UNION|ALL|INTERSECT|MINUS|INSERT|INTO|VALUES|UPDATE|SET|DELETE|MERGE|USING|MATCHED|CREATE|ALTER|DROP|TRUNCATE|TABLE|INDEX|VIEW|SEQUENCE|SYNONYM|BEGIN|END|DECLARE|IS|EXCEPTION|WHEN|THEN|ELSE|ELSIF|IF|LOOP|FOR|WHILE|EXIT|RETURN|RAISE|COMMIT|ROLLBACK|SAVEPOINT|GRANT|REVOKE|WITH|CONSTRAINT|PRIMARY|FOREIGN|KEY|REFERENCES|UNIQUE|CHECK|DEFAULT|NULL|EXISTS|CASE|OPEN|FETCH|CLOSE|CURSOR|AFTER|BEFORE|EACH|ROW|REPLACE|OF|TYPE|CONSTANT|OUT|NEXTVAL|CURRVAL|PURGE|CASCADE|CYCLE|NOCYCLE|MAXVALUE|START|INCREMENT|PUBLIC|PARTITION|OVER|ROWS|RANGE|PROCEDURE|FUNCTION|TRIGGER|PACKAGE|BODY|MATCHED|CACHE|COMMENT)\b/gi;
  const fn=/\b(COUNT|SUM|AVG|MIN|MAX|NVL|NVL2|NULLIF|COALESCE|DECODE|TO_DATE|TO_CHAR|TO_NUMBER|SYSDATE|SYSTIMESTAMP|UPPER|LOWER|INITCAP|LENGTH|SUBSTR|INSTR|TRIM|LTRIM|RTRIM|REPLACE|LPAD|RPAD|CONCAT|ROUND|TRUNC|MOD|ABS|POWER|SQRT|CEIL|FLOOR|ADD_MONTHS|MONTHS_BETWEEN|NEXT_DAY|LAST_DAY|EXTRACT|RANK|DENSE_RANK|ROW_NUMBER|LAG|LEAD|LISTAGG|DBMS_OUTPUT|PUT_LINE|RAISE_APPLICATION_ERROR|USER|CURRENT_DATE|DUAL|ROWNUM|ROWID|LEVEL)\b/g;
  return c
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/('[^']*')/g,'<span class="str">$1</span>')
    .replace(/(--[^\n]*)/g,'<span class="cm">$1</span>')
    .replace(kw,'<span class="kw">$&</span>')
    .replace(fn,'<span class="fn">$&</span>')
    .replace(/\b(\d+(\.\d+)?)\b/g,'<span class="num">$1</span>');
}

let curId=null, cpIdx=0;

function buildSidebar(q=''){
  const sb=document.getElementById('sb');
  sb.innerHTML='';
  const cats={};
  let vis=0;
  TDATA.forEach(t=>{
    const m=!q||t.title.toLowerCase().includes(q)||t.cat.toLowerCase().includes(q)||t.search.toLowerCase().includes(q);
    if(!cats[t.cat])cats[t.cat]=[];
    if(m){cats[t.cat].push(t);vis++;}
  });
  document.getElementById('badge').textContent=vis+' Topics';
  Object.entries(cats).forEach(([cat,topics])=>{
    if(!topics.length)return;
    const wrap=document.createElement('div');
    const hdr=document.createElement('div');
    hdr.className='cat-h open';
    hdr.innerHTML='<span class="car">▶</span>'+cat+'<span style="margin-left:auto;color:var(--t3);font-size:10px">'+topics.length+'</span>';
    const ci=document.createElement('div');ci.className='ci';
    hdr.onclick=()=>{hdr.classList.toggle('open');ci.classList.toggle('hid')};
    topics.forEach(t=>{
      const el=document.createElement('div');
      el.className='ti'+(t.id===curId?' active':'');
      el.dataset.id=t.id;
      const esc=s=>s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      const tl=q?t.title.replace(new RegExp('('+esc(q)+')','gi'),'<span class="hl">$1</span>'):t.title;
      el.innerHTML='<span class="ti-n">'+String(t.id).padStart(2,'0')+'</span><span class="ti-label">'+tl+'</span>';
      el.onclick=()=>showTopic(t.id);
      ci.appendChild(el);
    });
    wrap.appendChild(hdr);wrap.appendChild(ci);sb.appendChild(wrap);
  });
  if(!vis&&q)sb.innerHTML='<div class="no-res">😕 "'+q+'" nahi mila<br><small style="margin-top:6px;display:block">Dusra keyword try karo</small></div>';
}

window.copyCode=function(btn,id){
  const pre=document.getElementById('pre-'+id);
  if(!pre)return;
  navigator.clipboard.writeText(pre.textContent).then(()=>{
    btn.textContent='✓ Copied!';btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('ok')},1500);
  });
};

function makeCode(code,label){
  const id='p'+(cpIdx++);
  return '<div class="cb"><div class="ct"><span class="cl">'+(label||'SQL')+'</span><button class="cpb" onclick="copyCode(this,\''+id+'\')">Copy</button></div><pre id="pre-'+id+'">'+hlCode(code.trim())+'</pre></div>';
}

function makeTable(tbl){
  let h='<div class="tw"><table><thead><tr>'+tbl.h.map(x=>'<th>'+x+'</th>').join('')+'</tr></thead><tbody>';
  tbl.r.forEach(r=>{h+='<tr>'+r.map(c=>'<td>'+c+'</td>').join('')+'</tr>'});
  return h+'</tbody></table></div>';
}

function makeRev(items){
  if(!items||!items.length)return'';
  let h='<div class="rev"><div class="rev-t">📌 Short Revision</div><div class="rev-g">';
  items.forEach(i=>{h+='<div class="ri"><div class="rl">'+i.l+'</div><code>'+i.c+'</code></div>'});
  return h+'</div></div>';
}

function makePrac(qs){
  if(!qs||!qs.length)return'';
  let h='<div class="prac"><div class="prac-t">✏️ Practice Questions</div><ol>';
  qs.forEach(q=>{h+='<li>'+q+'</li>'});
  return h+'</ol></div>';
}

function renderBlock(b){
  if(b.type==='sec'){
    let h='<div class="sec"><div class="sh">'+b.title+'</div>';
    b.items.forEach(item=>{
      if(item.type==='prose')h+='<div class="prose">'+item.text+'</div>';
      else if(item.type==='code')h+=makeCode(item.text,item.lang);
      else if(item.type==='table')h+=makeTable(item.data);
      else if(item.type==='list')h+='<ul class="blist">'+item.items.map(x=>'<li>'+x+'</li>').join('')+'</ul>';
      else if(item.type==='info')h+='<div class="info"><strong>💡 Note:</strong> '+item.text+'</div>';
      else if(item.type==='warn')h+='<div class="warn"><strong>⚠️ Warning:</strong> '+item.text+'</div>';
      else if(item.type==='err')h+='<div class="err"><strong>❌ Error/Caution:</strong> '+item.text+'</div>';
      else if(item.type==='dbox')h+='<div class="dbox">'+item.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>';
    });
    return h+'</div>';
  }
  if(b.type==='rev')return makeRev(b.items);
  if(b.type==='prac')return makePrac(b.items);
  return'';
}

function showTopic(id){
  const t=TDATA.find(x=>x.id===id);if(!t)return;
  curId=id;
  document.querySelectorAll('.ti').forEach(el=>el.classList.toggle('active',+el.dataset.id===id));
  document.getElementById('welcome').style.display='none';
  const area=document.getElementById('topicArea');area.style.display='block';
  cpIdx=0;
  const idx=TDATA.findIndex(x=>x.id===id);
  const prev=TDATA[idx-1],next=TDATA[idx+1];
  let html='<div class="ttag">'+t.cat+'</div><div class="ttitle">'+t.title+'</div>';
  t.blocks.forEach(b=>{html+=renderBlock(b)});
  html+='<div class="nav-row">'+(prev?'<button class="nb" onclick="showTopic('+prev.id+')">← '+prev.title+'</button>':'<div></div>')+(next?'<button class="nb nx" onclick="showTopic('+next.id+')">'+next.title+' →</button>':'<div></div>')+'</div>';
  area.innerHTML=html;
  document.querySelector('main').scrollTo(0,0);
}

const wg=document.getElementById('wgrid');
TDATA.forEach(t=>{
  const c=document.createElement('div');c.className='wcard';
  c.innerHTML='<span class="wnum">'+String(t.id).padStart(2,'0')+'</span>'+t.title;
  c.onclick=()=>showTopic(t.id);wg.appendChild(c);
});

document.getElementById('si').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  buildSidebar(q);
  if(q){const m=TDATA.find(t=>t.title.toLowerCase().includes(q)||t.search.toLowerCase().includes(q));if(m)showTopic(m.id);}
});
buildSidebar();

</script>
