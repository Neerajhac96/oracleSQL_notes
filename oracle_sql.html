<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2032;--bg4:#222740;--border:#252d47;--border2:#394270;--accent:#e0af68;--a2:#7aa2f7;--a3:#9ece6a;--a4:#bb9af7;--a5:#2ac3de;--red:#f7768e;--text:#c0caf5;--t2:#9aa5ce;--t3:#565f89;--kw:#bb9af7;--fn:#7aa2f7;--str:#9ece6a;--num:#ff9e64;--cm:#565f89;}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.7}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:14px;height:52px;position:sticky;top:0;z-index:100}
.logo{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--accent);white-space:nowrap}
.logo span{color:var(--a2)}
.sw{flex:1;position:relative;max-width:480px}
.sw input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 14px 7px 34px;border-radius:7px;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:.2s}
.sw input:focus{border-color:var(--a2);box-shadow:0 0 0 3px rgba(122,162,247,.1)}
.sw input::placeholder{color:var(--t3)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;pointer-events:none}
.badge{background:var(--accent);color:#1a1a2e;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;margin-left:auto;white-space:nowrap}
.layout{display:flex;height:calc(100vh - 52px);overflow:hidden}
aside{width:260px;min-width:260px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
aside::-webkit-scrollbar{width:3px}
aside::-webkit-scrollbar-thumb{background:var(--border2)}
.cat-h{padding:10px 14px 4px;font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--t3);text-transform:uppercase;display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none}
.cat-h:hover{color:var(--t2)}
.car{font-size:9px;transition:.2s;color:var(--t3)}
.cat-h.open .car{transform:rotate(90deg);color:var(--accent)}
.ci{overflow:hidden}
.ci.hid{display:none}
.ti{padding:6px 14px 6px 24px;font-size:12.5px;color:var(--t2);cursor:pointer;border-left:2px solid transparent;transition:.12s;display:flex;align-items:flex-start;gap:6px}
.ti:hover{color:var(--text);background:rgba(122,162,247,.05)}
.ti.active{color:var(--accent);border-left-color:var(--accent);background:rgba(224,175,104,.06)}
.ti-n{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);min-width:20px;padding-top:2px;flex-shrink:0}
.ti-label{line-height:1.4}
.no-res{padding:28px 14px;color:var(--t3);font-size:12px;text-align:center}
main{flex:1;overflow-y:auto;background:var(--bg)}
main::-webkit-scrollbar{width:5px}
main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:5px}
.content{max-width:860px;padding:28px 36px 60px;margin:0 auto}
.welcome{text-align:center;padding:50px 20px}
.wt{font-size:36px;font-weight:700;letter-spacing:-.5px;margin-bottom:12px;line-height:1.2}
.wt .o{color:var(--accent)}.wt .s{color:var(--a2)}
.ws{color:var(--t2);margin-bottom:32px;font-size:15px}
.wstats{display:flex;gap:28px;justify-content:center;margin-bottom:36px}
.wst{text-align:center}
.wsn{font-size:32px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent)}
.wsl{font-size:11px;color:var(--t3);margin-top:2px}
.wgrid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:700px;margin:0 auto}
.wcard{background:var(--bg2);border:1px solid var(--border);padding:8px 14px;border-radius:8px;font-size:12px;color:var(--t2);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;text-align:left}
.wcard:hover{border-color:var(--a2);color:var(--text);background:rgba(122,162,247,.07)}
.wnum{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);min-width:20px}
.ttag{display:inline-block;background:rgba(122,162,247,.12);color:var(--a2);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:10px;letter-spacing:.06em;text-transform:uppercase}
.ttitle{font-size:26px;font-weight:700;color:var(--text);margin-bottom:10px;letter-spacing:-.3px;line-height:1.3}
.sec{margin-bottom:28px}
.sh{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.sh::before{content:'';display:inline-block;width:3px;height:14px;background:var(--accent);border-radius:2px;flex-shrink:0}
.prose{color:var(--t2);font-size:13.5px;line-height:1.85;margin-bottom:11px}
.prose strong{color:var(--text);font-weight:600}
.prose em{color:var(--accent);font-style:normal;font-weight:500}
.cb{background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px}
.ct{display:flex;align-items:center;justify-content:space-between;padding:7px 13px;background:rgba(0,0,0,.2);border-bottom:1px solid var(--border)}
.cl{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace;font-weight:600;letter-spacing:.07em}
.cpb{background:none;border:1px solid var(--border);color:var(--t3);font-size:10px;padding:2px 8px;border-radius:4px;cursor:pointer;font-family:'Inter',sans-serif;transition:.15s}
.cpb:hover{border-color:var(--accent);color:var(--accent)}
.cpb.ok{border-color:var(--a3);color:var(--a3)}
pre{padding:14px 16px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.8;tab-size:4}
pre::-webkit-scrollbar{height:3px}
pre::-webkit-scrollbar-thumb{background:var(--border2)}
.kw{color:var(--kw);font-weight:600}.fn{color:var(--fn)}.str{color:var(--str)}.num{color:var(--num)}.cm{color:var(--cm);font-style:italic}
.tw{overflow-x:auto;margin-bottom:16px;border-radius:8px;border:1px solid var(--border)}
table{border-collapse:collapse;min-width:100%;font-size:13px}
thead tr{background:var(--bg4)}
th{color:var(--accent);font-weight:600;padding:10px 14px;text-align:left;white-space:nowrap}
td{padding:8px 14px;border-top:1px solid var(--border);color:var(--t2);vertical-align:top;line-height:1.6}
tr:hover td{background:rgba(255,255,255,.015);color:var(--text)}
.info{background:rgba(154,206,106,.06);border:1px solid rgba(154,206,106,.2);border-left:3px solid var(--a3);border-radius:8px;padding:11px 14px;margin-bottom:14px;font-size:13px;color:var(--t2);line-height:1.7}
.warn{background:rgba(224,175,104,.06);border:1px solid rgba(224,175,104,.2);border-left:3px solid var(--accent);border-radius:8px;padding:11px 14px;margin-bottom:14px;font-size:13px;color:var(--t2)}
.err{background:rgba(247,118,142,.06);border:1px solid rgba(247,118,142,.2);border-left:3px solid var(--red);border-radius:8px;padding:11px 14px;margin-bottom:14px;font-size:13px;color:var(--t2)}
.info strong{color:var(--a3)}.warn strong{color:var(--accent)}.err strong{color:var(--red)}
ul.blist{list-style:none;padding:0;margin-bottom:12px}
ul.blist li{padding:5px 0 5px 18px;color:var(--t2);font-size:13.5px;position:relative;border-bottom:1px solid var(--border)}
ul.blist li:last-child{border-bottom:none}
ul.blist li::before{content:'▸';position:absolute;left:0;color:var(--accent);font-size:11px;top:7px}
ul.blist li strong{color:var(--text)}
.rev{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px;margin:20px 0}
.rev-t{font-size:11px;font-weight:700;color:var(--a4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.rev-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.ri{background:var(--bg4);border:1px solid var(--border);border-radius:7px;padding:9px 11px}
.rl{font-size:10px;color:var(--t3);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.ri code{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--a3);display:block;line-height:1.5;white-space:pre-wrap}
.prac{background:rgba(122,162,247,.05);border:1px solid rgba(122,162,247,.15);border-radius:9px;padding:14px 16px;margin-top:20px}
.prac-t{font-size:11px;font-weight:700;color:var(--a2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.prac ol{padding-left:18px}
.prac ol li{color:var(--t2);font-size:13px;padding:4px 0;line-height:1.6}
.dbox{background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--a3);margin-bottom:12px;white-space:pre;overflow-x:auto;line-height:1.7}
.nav-row{display:flex;gap:10px;margin-top:32px;padding-top:20px;border-top:1px solid var(--border)}
.nb{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--t2);padding:10px 14px;border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:.15s;font-family:'Inter',sans-serif}
.nb:hover{border-color:var(--a2);color:var(--text)}
.nb.nx{background:rgba(122,162,247,.08);border-color:var(--a2);color:var(--a2)}
.hl{background:rgba(224,175,104,.2);color:var(--accent);border-radius:2px;padding:0 2px}
</style>
</head>

<script>
const TDATA = [{"id":1,"cat":"SQL Basics","title":"Introduction to Databases & SQL","search":"database dbms rdbms sql ddl dml dcl tcl dql structured query language","blocks":[{"type":"sec","title":"What is a Database?","items":[{"type":"prose","text":"A database is an <strong>organized collection of related data</strong> stored electronically."},{"type":"table","data":{"h":["Roll_No","Name","Marks"],"r":[["101","Ram","90"],["102","Shyam","85"],["103","Mohan","92"]]}},{"type":"prose","text":"This table is part of a database."}]},{"type":"sec","title":"What is DBMS?","items":[{"type":"prose","text":"<strong>DBMS (Database Management System)</strong> is software used to store, manage, and retrieve data."},{"type":"list","items":["Oracle Database","MySQL","PostgreSQL","SQL Server"]}]},{"type":"sec","title":"What is RDBMS?","items":[{"type":"prose","text":"<strong>RDBMS (Relational Database Management System)</strong> stores data in tables (rows and columns) and establishes relationships between tables."},{"type":"prose","text":"<em>Oracle Database is an RDBMS.</em>"}]},{"type":"sec","title":"What is SQL?","items":[{"type":"prose","text":"SQL stands for <strong>Structured Query Language</strong>. It is used to:"},{"type":"list","items":["Store data","Retrieve data","Update data","Delete data","Create database objects"]},{"type":"code","text":"SELECT * FROM STUDENTS;\n-- This command retrieves all records from the STUDENTS table."}]},{"type":"sec","title":"SQL Categories","items":[{"type":"prose","text":"<strong>1. DDL (Data Definition Language)</strong> — Used to define database structure."},{"type":"list","items":["CREATE","ALTER","DROP","TRUNCATE","RENAME"]},{"type":"code","text":"CREATE TABLE STUDENTS (\n    ID   NUMBER,\n    NAME VARCHAR2(30)\n);"},{"type":"prose","text":"<strong>2. DML (Data Manipulation Language)</strong> — Used to manipulate data."},{"type":"list","items":["INSERT","UPDATE","DELETE"]},{"type":"code","text":"INSERT INTO STUDENTS VALUES (1, 'RAM');"},{"type":"prose","text":"<strong>3. DQL (Data Query Language)</strong> — Used to retrieve data."},{"type":"code","text":"SELECT * FROM STUDENTS;"},{"type":"prose","text":"<strong>4. TCL (Transaction Control Language)</strong> — Controls transactions."},{"type":"list","items":["COMMIT","ROLLBACK","SAVEPOINT"]},{"type":"prose","text":"<strong>5. DCL (Data Control Language)</strong> — Controls access permissions."},{"type":"list","items":["GRANT","REVOKE"]}]},{"type":"sec","title":"Real-Life Example (Bank)","items":[{"type":"prose","text":"Think of a bank:"},{"type":"list","items":["Database = All customer records.","Table = Account table.","Row = One customer's account.","Column = Name, Account Number, Balance.","SQL = Commands used to interact with these records."]}]},{"type":"rev","items":[{"l":"Database","c":"Collection of data"},{"l":"DBMS","c":"Software to manage data"},{"l":"RDBMS","c":"Stores data in tables"},{"l":"Oracle","c":"Is an RDBMS"},{"l":"SQL","c":"Structured Query Language"},{"l":"DDL","c":"CREATE ALTER DROP TRUNCATE"},{"l":"DML","c":"INSERT UPDATE DELETE"},{"l":"DQL","c":"SELECT"},{"l":"TCL","c":"COMMIT ROLLBACK SAVEPOINT"},{"l":"DCL","c":"GRANT REVOKE"}]}]},{"id":2,"cat":"SQL Basics","title":"Oracle Data Types & Table Structure","search":"data type char varchar2 number date timestamp clob blob null precision scale","blocks":[{"type":"sec","title":"What is a Data Type?","items":[{"type":"prose","text":"A data type specifies: what kind of data can be stored, how much storage is required, and what operations can be performed on that data. Think of a table as a form — each field accepts only a certain type of information."},{"type":"table","data":{"h":["EMP_ID","NAME","SALARY","DOB"],"r":[["101","Ram","50000","15-JAN-2000"]]}},{"type":"list","items":["EMP_ID → Number","NAME → Text","SALARY → Number","DOB → Date"]},{"type":"prose","text":"Oracle mainly provides: <strong>Character Types, Numeric Types, Date and Time Types, Large Object Types (LOB), Miscellaneous Types.</strong>"}]},{"type":"sec","title":"1. Character Data Types","items":[{"type":"prose","text":"<strong>CHAR</strong> — Stores fixed-length strings."},{"type":"code","text":"-- Syntax:\ncolumn_name CHAR(size)\n\n-- Example:\nGENDER CHAR(1)    -- 'M' or 'F'\nCODE   CHAR(5)    -- Insert 'A' → stored as 'A    ' (4 spaces added)\n\n-- CHAR pads with spaces to fill fixed size\nCREATE TABLE STUDENT(\n    GENDER CHAR(1)\n);\nINSERT INTO STUDENT VALUES('M');"},{"type":"prose","text":"<strong>When to use CHAR?</strong> For fixed-length values like Gender, State codes, Country codes."},{"type":"prose","text":"<strong>VARCHAR2</strong> — Stores variable-length strings. Unlike CHAR, no extra spaces are added."},{"type":"code","text":"-- Syntax:\ncolumn_name VARCHAR2(size)\n\n-- Example:\nNAME VARCHAR2(30)   -- 'RAM' → only 3 chars stored\n\nCREATE TABLE EMPLOYEE(\n    NAME VARCHAR2(30)\n);\nINSERT INTO EMPLOYEE VALUES('NEERAJ');  -- Storage used = 6 characters\n\n-- Use VARCHAR2 for: Name, Address, Email, Department"},{"type":"prose","text":"<strong>Difference Between CHAR and VARCHAR2:</strong>"},{"type":"table","data":{"h":["CHAR","VARCHAR2"],"r":[["Fixed length","Variable length"],["Adds spaces","No extra spaces"],["Faster comparison","Saves storage"],["Used for fixed values","Used for most text"]]}}]},{"type":"sec","title":"2. Numeric Data Type — NUMBER","items":[{"type":"prose","text":"<strong>NUMBER(p, s)</strong> — Stores integers and decimal values. p = precision (total digits), s = scale (digits after decimal)."},{"type":"code","text":"-- NUMBER(5): max 5 digits\nAGE NUMBER(5)\n-- Valid: 12345, 99999\n-- Invalid: 123456 (six digits exceed precision)\n\n-- NUMBER(8,2): 8 total digits, 2 decimal places\nSALARY NUMBER(8,2)\n-- Valid:   12500.75, 999999.99\n-- Invalid: 1234567.89 (total digits > 8)\n\nCREATE TABLE EMP(\n    SALARY NUMBER(8,2)\n);\nINSERT INTO EMP VALUES(25000.50);  -- Stored as: 25000.50"}]},{"type":"sec","title":"3. DATE Data Type","items":[{"type":"prose","text":"<strong>DATE</strong> — Stores Day, Month, Year, Hour, Minute, Second."},{"type":"code","text":"DOB DATE\n\nCREATE TABLE STUDENT(\n    NAME VARCHAR2(20),\n    DOB  DATE\n);\n\n-- Insert date:\nINSERT INTO STUDENT VALUES('RAM', '15-JAN-2001');\n\n-- Better way (recommended):\nINSERT INTO STUDENT\nVALUES('RAM', TO_DATE('15-01-2001','DD-MM-YYYY'));\n-- TO_DATE converts strings to dates safely and avoids format errors"},{"type":"prose","text":"<strong>TIMESTAMP</strong> — Stores date + time with fractional seconds. Useful for login records, event tracking, audit systems."},{"type":"code","text":"LOGIN_TIME TIMESTAMP\n-- Value: 21-JUN-2026 10:45:15.123456"}]},{"type":"sec","title":"4. Large Object Data Types","items":[{"type":"prose","text":"<strong>CLOB (Character Large Object)</strong> — Stores huge text like Articles, Blogs, Documents. Size up to several GB."},{"type":"code","text":"DESCRIPTION CLOB"},{"type":"prose","text":"<strong>BLOB (Binary Large Object)</strong> — Stores Images, Videos, PDFs, Audio."},{"type":"code","text":"PHOTO BLOB"}]},{"type":"sec","title":"5. NULL","items":[{"type":"prose","text":"NULL means <strong>absence of value</strong>. It does NOT mean 0 or empty string or space. It means: <strong>Unknown or unavailable value.</strong>"},{"type":"table","data":{"h":["NAME","PHONE"],"r":[["RAM","NULL"]]}}]},{"type":"sec","title":"Table Structure Example","items":[{"type":"prose","text":"Suppose we want to store employee information (Employee ID, Name, Salary, Joining Date):"},{"type":"table","data":{"h":["Column","Type"],"r":[["EMP_ID","NUMBER(5)"],["NAME","VARCHAR2(30)"],["SALARY","NUMBER(8,2)"],["JOIN_DATE","DATE"]]}},{"type":"dbox","text":"EMPLOYEE\n--------------------------------\nEMP_ID       NUMBER(5)\nNAME         VARCHAR2(30)\nSALARY       NUMBER(8,2)\nJOIN_DATE    DATE\n--------------------------------\n\nRows:\n101  RAM     50000.50  15-JAN-2024\n102  SHYAM   40000.00  10-MAR-2025"}]},{"type":"rev","items":[{"l":"CHAR(size)","c":"Fixed length text"},{"l":"VARCHAR2(size)","c":"Variable length text"},{"l":"NUMBER","c":"Numeric data"},{"l":"NUMBER(p)","c":"p = total digits"},{"l":"NUMBER(p,s)","c":"s = decimal digits"},{"l":"DATE","c":"Date and time"},{"l":"TIMESTAMP","c":"Date + fractional seconds"},{"l":"CLOB","c":"Large text"},{"l":"BLOB","c":"Binary data (images/files)"},{"l":"NULL","c":"Missing / unknown value"},{"l":"Precision","c":"Total digits"},{"l":"Scale","c":"Digits after decimal"}]},{"type":"prac","items":["CHAR aur VARCHAR2 mein kya fark hai?","DATE aur TIMESTAMP mein kya fark hai?","CLOB aur BLOB kab use karte hain?","NUMBER(5,2) mein maximum value kya hogi?","NULL ka matlab kya hai?"]}]},{"id":3,"cat":"SQL Basics","title":"CREATE TABLE Statement","search":"create table column definition syntax describe desc naming rules mistakes","blocks":[{"type":"sec","title":"What is a Table?","items":[{"type":"prose","text":"A table is a collection of related data organized into rows and columns. Think of a table like an Excel sheet."},{"type":"table","data":{"h":["ID","NAME","AGE","MARKS"],"r":[["101","Ram","20","90"],["102","Shyam","21","85"]]}},{"type":"prose","text":"Columns represent attributes (ID, NAME, AGE, MARKS). Rows represent records."}]},{"type":"sec","title":"CREATE TABLE Syntax","items":[{"type":"code","text":"-- Syntax:\nCREATE TABLE table_name (\n    column1 datatype,\n    column2 datatype,\n    column3 datatype\n);\n\n-- Example:\nCREATE TABLE STUDENT (\n    ID   NUMBER(5),\n    NAME VARCHAR2(30),\n    AGE  NUMBER(2)\n);\n-- This creates a table named STUDENT with three columns."}]},{"type":"sec","title":"Understanding Column Definitions","items":[{"type":"prose","text":"<strong>ID NUMBER(5)</strong> means: Column name = ID, Data type = NUMBER, Maximum 5 digits. Example values: 1, 101, 99999"},{"type":"prose","text":"<strong>NAME VARCHAR2(30)</strong> means: Stores text, Maximum length = 30 characters. Examples: RAM, SHYAM, NEERAJ KUMAR"},{"type":"prose","text":"<strong>AGE NUMBER(2)</strong> means: Maximum 2-digit number. Examples: 20, 25, 99 (Maximum: 99)"}]},{"type":"sec","title":"Creating Employee Table","items":[{"type":"code","text":"CREATE TABLE EMPLOYEE(\n    EMP_ID    NUMBER(5),\n    NAME      VARCHAR2(30),\n    SALARY    NUMBER(8,2),\n    JOIN_DATE DATE\n);"},{"type":"table","data":{"h":["Column","Type"],"r":[["EMP_ID","NUMBER(5)"],["NAME","VARCHAR2(30)"],["SALARY","NUMBER(8,2)"],["JOIN_DATE","DATE"]]}},{"type":"prose","text":"<strong>Understanding NUMBER(8,2):</strong> SALARY NUMBER(8,2) → Total digits = 8, Digits after decimal = 2. Valid: 50000.25, 123456.78. Invalid: 123456789.00 (total digits exceed 8)."}]},{"type":"sec","title":"DESCRIBE Command","items":[{"type":"prose","text":"After creating a table, check its structure using DESC:"},{"type":"code","text":"DESC EMPLOYEE;\n-- or\nDESCRIBE EMPLOYEE;\n\n-- Output:\n-- Name          Null? Type\n-- ----------------------------------\n-- EMP_ID               NUMBER(5)\n-- NAME                 VARCHAR2(30)\n-- SALARY               NUMBER(8,2)\n-- JOIN_DATE            DATE"}]},{"type":"sec","title":"Naming Rules","items":[{"type":"prose","text":"<strong>✔ Valid table names:</strong> STUDENT, EMPLOYEE, EMP_DETAILS, EMP123"},{"type":"prose","text":"<strong>❌ Invalid table names:</strong> 123EMP (starts with number), EMP-NAME (has hyphen), SELECT (reserved word)"},{"type":"list","items":["Must start with a letter.","Can contain letters, digits, _, $, #.","Maximum length = 128 characters.","Avoid reserved words like SELECT, TABLE, WHERE."]}]},{"type":"sec","title":"More Table Examples","items":[{"type":"code","text":"-- College Students table:\nCREATE TABLE STUDENTS(\n    ROLL_NO NUMBER(5),\n    NAME    VARCHAR2(40),\n    BRANCH  VARCHAR2(20),\n    CGPA    NUMBER(3,2)\n);\n-- Example records:\n-- | 101 | Ram   | MCA | 8.50 |\n-- | 102 | Shyam | BCA | 7.80 |\n\n-- Books table:\nCREATE TABLE BOOKS(\n    BOOK_ID NUMBER(4),\n    TITLE   VARCHAR2(50),\n    AUTHOR  VARCHAR2(40),\n    PRICE   NUMBER(6,2)\n);\n-- Possible rows:\n-- | 1 | Java   | James | 500.50 |\n-- | 2 | Python | Guido | 650.00 |\n\n-- Person table with different data types:\nCREATE TABLE PERSON(\n    ID     NUMBER(5),\n    NAME   VARCHAR2(30),\n    GENDER CHAR(1),\n    DOB    DATE,\n    EMAIL  VARCHAR2(50),\n    SALARY NUMBER(10,2)\n);"}]},{"type":"sec","title":"Common Mistakes","items":[{"type":"err","text":"Missing comma between column definitions."},{"type":"code","text":"-- WRONG:\nCREATE TABLE STUDENT(\n    ID NUMBER(5)\n    NAME VARCHAR2(30)   -- comma missing!\n);\n\n-- CORRECT:\nCREATE TABLE STUDENT(\n    ID   NUMBER(5),\n    NAME VARCHAR2(30)   -- last column mein comma nahi\n);"},{"type":"err","text":"Missing parentheses around column definitions."},{"type":"code","text":"-- WRONG:\nCREATE TABLE STUDENT\nID NUMBER(5),\nNAME VARCHAR2(30);\n\n-- CORRECT:\nCREATE TABLE STUDENT(\n    ID   NUMBER(5),\n    NAME VARCHAR2(30)\n);"}]},{"type":"rev","items":[{"l":"Create Table","c":"CREATE TABLE name(...)"},{"l":"Check Structure","c":"DESC table_name"},{"l":"NUMBER","c":"Numeric data type"},{"l":"VARCHAR2","c":"Variable text"},{"l":"CHAR","c":"Fixed text"},{"l":"DATE","c":"Date values"},{"l":"Key Rule","c":"Table structure only, no data"}]},{"type":"prac","items":["STUDENT table banao: ID NUMBER(5), NAME VARCHAR2(30), AGE NUMBER(2)","PRODUCT table banao: PRODUCT_ID NUMBER(5), PRODUCT_NAME VARCHAR2(50), PRICE NUMBER(7,2)","MOVIES table banao: MOVIE_ID NUMBER(5), TITLE VARCHAR2(50), RELEASE_DATE DATE","DESC command se table structure check karo"]}]},{"id":4,"cat":"DML","title":"INSERT INTO Statement","search":"insert into values dml data manipulation null to_date commit rollback dual insert all","blocks":[{"type":"sec","title":"What is INSERT INTO?","items":[{"type":"prose","text":"INSERT INTO is a <strong>DML (Data Manipulation Language)</strong> command used to insert data into a table."},{"type":"code","text":"CREATE TABLE STUDENT(\n    ID    NUMBER(5),\n    NAME  VARCHAR2(30),\n    AGE   NUMBER(2),\n    MARKS NUMBER(5,2)\n);\n-- Initially: (No Rows)"}]},{"type":"sec","title":"Method 1: Insert Values Into All Columns","items":[{"type":"code","text":"-- Syntax:\nINSERT INTO table_name\nVALUES(value1, value2, value3,...);\n\n-- Example:\nINSERT INTO STUDENT\nVALUES(101, 'RAM', 20, 85.50);\n\n-- Insert another row:\nINSERT INTO STUDENT\nVALUES(102, 'SHYAM', 21, 90);\n\n-- Table becomes:\n-- | ID  | NAME  | AGE | MARKS |\n-- | 101 | RAM   | 20  | 85.50 |\n-- | 102 | SHYAM | 21  | 90    |"},{"type":"warn","text":"<strong>Order Matters!</strong> Values must match column order exactly. Wrong: INSERT INTO STUDENT VALUES('RAM',101,20,85) → Error because ID expects NUMBER."}]},{"type":"sec","title":"Method 2: Specify Column Names","items":[{"type":"code","text":"-- Syntax:\nINSERT INTO table_name(column1, column2,...)\nVALUES(value1, value2,...);\n\n-- Example (AGE and MARKS not supplied → NULL):\nINSERT INTO STUDENT(ID, NAME)\nVALUES(103, 'MOHAN');\n-- Result: | 103 | MOHAN | NULL | NULL |\n\nINSERT INTO STUDENT(ID, NAME)\nVALUES(104, 'ROHAN');\n-- Result: | 104 | ROHAN | NULL | NULL |"},{"type":"info","text":"<strong>Understanding NULL:</strong> NULL means 'value unknown or absent'. NULL ≠ 0. NULL ≠ Empty String. NULL means no value exists."}]},{"type":"sec","title":"Inserting Dates","items":[{"type":"code","text":"CREATE TABLE EMPLOYEE(\n    EMP_ID    NUMBER(5),\n    NAME      VARCHAR2(30),\n    JOIN_DATE DATE\n);\n\n-- Recommended way with TO_DATE:\nINSERT INTO EMPLOYEE\nVALUES(101, 'RAM', TO_DATE('15-01-2025','DD-MM-YYYY'));\n-- Stored: | 101 | RAM | 15-JAN-25 |\n\n-- Without TO_DATE may fail depending on Oracle's default format:\nINSERT INTO EMPLOYEE VALUES(101,'RAM','15-01-2025');  -- May error!\n\n-- Always prefer: TO_DATE('15-01-2025','DD-MM-YYYY')"}]},{"type":"sec","title":"Rules for Data Types","items":[{"type":"code","text":"-- Decimal numbers:\nCREATE TABLE PRODUCT(\n    ID    NUMBER(4),\n    PRICE NUMBER(8,2)\n);\nINSERT INTO PRODUCT VALUES(1, 499.99);  -- Stored: 1  499.99\n\n-- Character data MUST be inside single quotes:\nINSERT INTO STUDENT VALUES(105, 'RAHUL', 22, 92);   -- Correct\nINSERT INTO STUDENT VALUES(105,  RAHUL,  22, 92);   -- ERROR! RAHUL = column name\n\n-- Numeric values do NOT need quotes:\nINSERT INTO EMPLOYEE VALUES(101, 'RAM', 50000);  -- Correct"}]},{"type":"sec","title":"Multiple Inserts & Oracle INSERT ALL","items":[{"type":"code","text":"-- Multiple inserts (separate statements):\nINSERT INTO STUDENT VALUES(101, 'RAM', 20, 85);\nINSERT INTO STUDENT VALUES(102, 'SHYAM', 21, 90);\nINSERT INTO STUDENT VALUES(103, 'MOHAN', 22, 88);\n\n-- Table:\n-- | 101 | RAM   | 20 | 85 |\n-- | 102 | SHYAM | 21 | 90 |\n-- | 103 | MOHAN | 22 | 88 |\n\n-- Oracle INSERT ALL (multiple tables at once):\nCREATE TABLE STUDENT_A(ID NUMBER(5), NAME VARCHAR2(20));\nCREATE TABLE STUDENT_B(ID NUMBER(5), NAME VARCHAR2(20));\n\nINSERT ALL\n    INTO STUDENT_A VALUES(101,'RAM')\n    INTO STUDENT_B VALUES(101,'RAM')\nSELECT * FROM DUAL;\n-- DUAL = Oracle's special one-row table"}]},{"type":"sec","title":"COMMIT and ROLLBACK","items":[{"type":"code","text":"-- COMMIT: data permanently save karo\nINSERT INTO STUDENT VALUES(101,'RAM',20,85);\nCOMMIT;  -- Changes become permanent\n\n-- ROLLBACK: undo uncommitted changes\nINSERT INTO STUDENT VALUES(102,'SHYAM',21,90);\nROLLBACK;  -- The inserted row disappears (if not committed)\n\n-- After COMMIT: ROLLBACK cannot undo the changes"},{"type":"warn","text":"Inserted data is <strong>NOT permanently saved</strong> until you COMMIT. Always COMMIT after DML operations."}]},{"type":"sec","title":"Complete Example","items":[{"type":"code","text":"CREATE TABLE EMPLOYEE(\n    EMP_ID    NUMBER(5),\n    NAME      VARCHAR2(30),\n    SALARY    NUMBER(8,2),\n    JOIN_DATE DATE\n);\n\nINSERT INTO EMPLOYEE\nVALUES(101,'RAM',50000,TO_DATE('15-01-2025','DD-MM-YYYY'));\n\nINSERT INTO EMPLOYEE\nVALUES(102,'SHYAM',45000,TO_DATE('10-03-2025','DD-MM-YYYY'));\n\nCOMMIT;\n\n-- Table:\n-- | EMP_ID | NAME  | SALARY | JOIN_DATE  |\n-- | 101    | RAM   | 50000  | 15-JAN-25  |\n-- | 102    | SHYAM | 45000  | 10-MAR-25  |"}]},{"type":"sec","title":"Common Errors","items":[{"type":"err","text":"Number of values doesn't match columns: INSERT INTO STUDENT VALUES(101,'RAM'); → If table has 4 columns, Oracle expects 4 values."},{"type":"err","text":"Missing Quotes: INSERT INTO STUDENT VALUES(101,RAM,20,85); → ERROR! RAM must be 'RAM'."}]},{"type":"rev","items":[{"l":"All Columns","c":"INSERT INTO t VALUES(...)"},{"l":"Specific Cols","c":"INSERT INTO t(c1,c2) VALUES(...)"},{"l":"Date","c":"TO_DATE('15-01-2025','DD-MM-YYYY')"},{"l":"Multi-table","c":"INSERT ALL INTO...SELECT * FROM DUAL"},{"l":"Save","c":"COMMIT"},{"l":"Undo","c":"ROLLBACK"},{"l":"NULL","c":"Missing/unknown value"}]},{"type":"prac","items":["3 employees insert karo with all columns","Sirf ID aur NAME insert karo","Date ke saath employee insert karo using TO_DATE","INSERT ALL use karke 2 tables mein ek saath insert karo","ROLLBACK karo after insert"]}]},{"id":5,"cat":"SQL Basics","title":"SELECT Statement (Deep Dive)","search":"select star columns alias arithmetic distinct concatenation nvl null dual operator precedence","blocks":[{"type":"sec","title":"What is SELECT?","items":[{"type":"prose","text":"SELECT is a <strong>DQL (Data Query Language)</strong> command used to retrieve data from tables."},{"type":"table","data":{"h":["EMP_ID","NAME","SALARY","DEPT"],"r":[["101","RAM","50000","IT"],["102","SHYAM","45000","HR"],["103","MOHAN","60000","IT"]]}}]},{"type":"sec","title":"Basic Syntax","items":[{"type":"code","text":"-- Syntax:\nSELECT column1, column2, ...\nFROM table_name;\n\n-- Example:\nSELECT NAME, SALARY\nFROM EMPLOYEE;\n-- Output:\n-- | NAME  | SALARY |\n-- | RAM   | 50000  |\n-- | SHYAM | 45000  |\n-- | MOHAN | 60000  |"}]},{"type":"sec","title":"SELECT * (All Columns)","items":[{"type":"code","text":"-- * means 'all columns'\nSELECT * FROM EMPLOYEE;\n-- Internally Oracle reads:\nSELECT EMP_ID, NAME, SALARY, DEPT FROM EMPLOYEE;\n\n-- When to avoid SELECT *:\n-- In large tables with many columns, SELECT * may retrieve\n-- unnecessary data and reduce performance.\n-- Prefer:\nSELECT NAME, SALARY FROM EMPLOYEE;"}]},{"type":"sec","title":"Selecting Specific Columns","items":[{"type":"code","text":"SELECT NAME, DEPT FROM EMPLOYEE;\n-- Output: NAME and DEPT only\n\n-- Order of columns follows SELECT list:\nSELECT DEPT, NAME FROM EMPLOYEE;\n-- Output: DEPT comes first, then NAME"}]},{"type":"sec","title":"Arithmetic Expressions","items":[{"type":"code","text":"-- Give everyone a bonus of 5000:\nSELECT NAME, SALARY, SALARY + 5000 AS bonus_salary\nFROM EMPLOYEE;\n-- | NAME  | SALARY | BONUS_SALARY |\n-- | RAM   | 50000  | 55000        |\n-- | SHYAM | 45000  | 50000        |\n\n-- Annual salary:\nSELECT NAME, SALARY, SALARY * 12 AS annual_salary\nFROM EMPLOYEE;\n-- | RAM   | 50000 | 600000 |\n-- | SHYAM | 45000 | 540000 |\n\n-- Arithmetic Operators: +  -  *  /\nSELECT 10+5, 10-5, 10*5, 10/5 FROM DUAL;\n-- Output: 15  5  50  2"}]},{"type":"sec","title":"DUAL Table","items":[{"type":"prose","text":"Oracle provides a special one-row table named <strong>DUAL</strong>."},{"type":"code","text":"SELECT SYSDATE FROM DUAL;  -- Current date: 21-JUN-26\nSELECT 100*2   FROM DUAL;  -- 200\n-- DUAL contains exactly one row and one column."}]},{"type":"sec","title":"Column Aliases","items":[{"type":"code","text":"-- Aliases rename output columns\n-- Syntax:\nSELECT column_name alias FROM table;\n\nSELECT NAME, SALARY annual_salary FROM EMPLOYEE;\n-- Output column: ANNUAL_SALARY\n\n-- With quotes (for spaces or case):\nSELECT NAME, SALARY \"Monthly Salary\" FROM EMPLOYEE;\n-- Output: | Monthly Salary |"}]},{"type":"sec","title":"DISTINCT — Remove Duplicates","items":[{"type":"code","text":"-- Without DISTINCT:\nSELECT DEPT FROM EMPLOYEE;\n-- IT, HR, IT  ← duplicates\n\n-- With DISTINCT:\nSELECT DISTINCT DEPT FROM EMPLOYEE;\n-- | DEPT |\n-- | IT   |\n-- | HR   |\n-- Only unique values returned."}]},{"type":"sec","title":"Concatenation Operator ||","items":[{"type":"code","text":"-- || combines strings\nSELECT NAME || ' works in ' || DEPT FROM EMPLOYEE;\n-- Output:\n-- RAM works in IT\n-- SHYAM works in HR\n-- MOHAN works in IT\n\nSELECT 'Employee Name : ' || NAME FROM EMPLOYEE;\n-- Output:\n-- Employee Name : RAM\n-- Employee Name : SHYAM"}]},{"type":"sec","title":"NULL Values & NVL Function","items":[{"type":"prose","text":"Any arithmetic involving NULL gives NULL."},{"type":"code","text":"-- If COMMISSION is NULL:\nSELECT COMMISSION + 100 FROM EMPLOYEE;\n-- NULL + 100 = NULL\n\n-- NVL(column, replacement) — Replace NULL values:\nSELECT NAME, NVL(COMMISSION, 0) FROM EMPLOYEE;\n-- | RAM   | 1000 |\n-- | SHYAM | 0    |  ← NULL replaced with 0\n\n-- Using NVL in calculation:\nSELECT NAME, SALARY + NVL(COMMISSION, 0) AS total_income\nFROM EMPLOYEE;\n-- Without NVL: 45000 + NULL = NULL (wrong!)\n-- With NVL:    45000 + 0    = 45000 (correct!)"}]},{"type":"sec","title":"Operator Precedence","items":[{"type":"code","text":"-- * and / before + and -\nSELECT 10 + 5 * 2 FROM DUAL;   -- Result: 20 (5*2=10, then 10+10)\nSELECT (10 + 5) * 2 FROM DUAL; -- Result: 30 (15*2)\n-- Use parentheses to control order!"}]},{"type":"sec","title":"Complete Example","items":[{"type":"table","data":{"h":["EMP_ID","NAME","SALARY","COMMISSION","DEPT"],"r":[["101","RAM","50000","1000","IT"],["102","SHYAM","45000","NULL","HR"],["103","MOHAN","60000","3000","IT"]]}},{"type":"code","text":"SELECT NAME,\n       SALARY,\n       NVL(COMMISSION,0)             AS commission,\n       SALARY + NVL(COMMISSION,0)    AS total,\n       NAME || ' belongs to ' || DEPT AS info\nFROM EMPLOYEE;\n\n-- Output:\n-- | NAME  | SALARY | COMMISSION | TOTAL | INFO                  |\n-- | RAM   | 50000  | 1000       | 51000 | RAM belongs to IT     |\n-- | SHYAM | 45000  | 0          | 45000 | SHYAM belongs to HR   |\n-- | MOHAN | 60000  | 3000       | 63000 | MOHAN belongs to IT   |"}]},{"type":"rev","items":[{"l":"All columns","c":"SELECT *"},{"l":"Specific cols","c":"SELECT col1, col2"},{"l":"Rename output","c":"col AS alias"},{"l":"No duplicates","c":"SELECT DISTINCT col"},{"l":"Join strings","c":"col1 || ' ' || col2"},{"l":"Replace NULL","c":"NVL(col, value)"},{"l":"Special table","c":"DUAL (1 row, 1 col)"},{"l":"Current date","c":"SYSDATE"}]},{"type":"prac","items":["Sab employees ka naam aur salary retrieve karo","Annual salary calculate karo (salary*12) with alias","DISTINCT departments list karo","NVL use karke NULL commission ko 0 karo","Name aur department concatenate karo","Operator precedence test: 10+5*2 vs (10+5)*2"]}]},{"id":6,"cat":"SQL Basics","title":"WHERE Clause (Deep Dive)","search":"where filter condition comparison operator between in like wildcard percent underscore is null and or not","blocks":[{"type":"sec","title":"What is the WHERE Clause?","items":[{"type":"prose","text":"The WHERE clause <strong>filters rows</strong> based on conditions. Only rows satisfying the condition will be returned."},{"type":"code","text":"-- Syntax:\nSELECT column1, column2, ...\nFROM table_name\nWHERE condition;"},{"type":"table","data":{"h":["EMP_ID","NAME","SALARY","DEPT","AGE"],"r":[["101","RAM","50000","IT","25"],["102","SHYAM","45000","HR","28"],["103","MOHAN","60000","IT","30"],["104","RAHUL","40000","SALES","24"],["105","AMAN","70000","HR","32"]]}}]},{"type":"sec","title":"Comparison Operators","items":[{"type":"table","data":{"h":["Operator","Meaning"],"r":[["=","Equal to"],["&gt;","Greater than"],["&lt;","Less than"],["&gt;=","Greater than or equal"],["&lt;=","Less than or equal"],["&lt;&gt; or !=","Not equal"]]}},{"type":"code","text":"-- Equal To (=): IT department employees\nSELECT * FROM EMPLOYEE WHERE DEPT = 'IT';\n-- | 101 | RAM   | 50000 | IT | 25 |\n-- | 103 | MOHAN | 60000 | IT | 30 |\n\n-- Greater Than (>):\nSELECT * FROM EMPLOYEE WHERE SALARY > 50000;\n-- | MOHAN | 60000 |   | AMAN | 70000 |\n\n-- Less Than (<):\nSELECT * FROM EMPLOYEE WHERE AGE < 28;\n-- | RAM | 25 |  | RAHUL | 24 |\n\n-- Not Equal (<>):\nSELECT * FROM EMPLOYEE WHERE DEPT <> 'HR';\n-- RAM(IT), MOHAN(IT), RAHUL(SALES)"}]},{"type":"sec","title":"Logical Operators: AND, OR, NOT","items":[{"type":"code","text":"-- AND: both conditions must be true\nSELECT * FROM EMPLOYEE\nWHERE DEPT = 'IT' AND SALARY > 55000;\n-- Step 1: IT dept: RAM, MOHAN\n-- Step 2: Salary > 55000: MOHAN\n-- Output: | MOHAN | 60000 |\n\n-- OR: at least one condition true\nSELECT * FROM EMPLOYEE\nWHERE DEPT = 'IT' OR DEPT = 'HR';\n-- Output: RAM, MOHAN, SHYAM, AMAN\n\n-- NOT: negate condition\nSELECT * FROM EMPLOYEE WHERE NOT DEPT = 'IT';\n-- Output: SHYAM(HR), RAHUL(SALES), AMAN(HR)"}]},{"type":"sec","title":"BETWEEN Operator","items":[{"type":"code","text":"-- BETWEEN: range check (INCLUSIVE - both ends included)\nSELECT * FROM EMPLOYEE\nWHERE SALARY BETWEEN 40000 AND 60000;\n-- Equivalent to:\n-- WHERE SALARY >= 40000 AND SALARY <= 60000\n\n-- Output: RAM(50000), SHYAM(45000), MOHAN(60000), RAHUL(40000)"}]},{"type":"sec","title":"IN Operator","items":[{"type":"code","text":"-- IN: check multiple values (shortcut for multiple OR)\n-- Instead of:\nWHERE DEPT='IT' OR DEPT='HR' OR DEPT='SALES'\n\n-- Use:\nSELECT * FROM EMPLOYEE WHERE DEPT IN ('IT','HR','SALES');\n\n-- With numbers:\nSELECT * FROM EMPLOYEE WHERE AGE IN (24, 30);\n-- | MOHAN | 30 |  | RAHUL | 24 |"}]},{"type":"sec","title":"LIKE Operator & Wildcards","items":[{"type":"prose","text":"LIKE is used for <strong>pattern matching</strong>. Wildcards: <strong>%</strong> = any number of characters, <strong>_</strong> = exactly one character."},{"type":"code","text":"-- % wildcard: any number of characters\n-- Names starting with R:\nSELECT * FROM EMPLOYEE WHERE NAME LIKE 'R%';\n-- Matches: R, RA, RAM, RAHUL, RAMESH...\n-- Output: RAM, RAHUL\n\n-- Names ending with N:\nSELECT * FROM EMPLOYEE WHERE NAME LIKE '%N';\n-- Output: AMAN\n\n-- Names containing A:\nSELECT * FROM EMPLOYEE WHERE NAME LIKE '%A%';\n-- Output: RAM, RAHUL, AMAN\n\n-- _ wildcard: exactly ONE character\n-- 2nd letter is A:\nSELECT * FROM EMPLOYEE WHERE NAME LIKE '_A%';\n-- R A M → 1st=R, 2nd=A → matches!\n-- Output: RAM\n\n-- Exactly four characters:\nSELECT * FROM EMPLOYEE WHERE NAME LIKE '____';\n-- Output: AMAN (exactly 4 chars)"}]},{"type":"sec","title":"IS NULL","items":[{"type":"code","text":"-- IMPORTANT: Never use = NULL !\n-- Always use IS NULL or IS NOT NULL\n\n-- Find rows with NULL commission:\nSELECT * FROM EMPLOYEE WHERE COMMISSION IS NULL;\n-- Output: SHYAM\n\n-- Find rows with values:\nSELECT * FROM EMPLOYEE WHERE COMMISSION IS NOT NULL;\n-- Output: RAM, MOHAN"},{"type":"err","text":"<strong>WHERE COMMISSION = NULL</strong> → This returns NO results! Always use IS NULL."}]},{"type":"sec","title":"Operator Precedence with Multiple Conditions","items":[{"type":"code","text":"-- AND has HIGHER priority than OR!\nSELECT * FROM EMPLOYEE\nWHERE DEPT='IT' OR DEPT='HR' AND SALARY > 50000;\n-- Equivalent to:\n-- WHERE DEPT='IT' OR (DEPT='HR' AND SALARY>50000)\n-- Result: RAM(IT), MOHAN(IT), AMAN(HR salary>50000)\n\n-- Use parentheses to change precedence:\nSELECT * FROM EMPLOYEE\nWHERE (DEPT='IT' OR DEPT='HR') AND SALARY > 50000;\n-- Output: MOHAN, AMAN\n\n-- Combining conditions:\nSELECT * FROM EMPLOYEE\nWHERE SALARY BETWEEN 40000 AND 70000\n  AND DEPT IN ('IT','HR')\n  AND NAME LIKE '%A%';\n-- Result: RAM, AMAN"}]},{"type":"rev","items":[{"l":"Equal","c":"WHERE DEPT='IT'"},{"l":"Not equal","c":"WHERE DEPT <> 'HR'"},{"l":"Greater","c":"WHERE SALARY > 50000"},{"l":"Range","c":"BETWEEN 40000 AND 60000"},{"l":"List","c":"IN ('IT','HR')"},{"l":"Pattern","c":"LIKE 'R%'"},{"l":"One char","c":"LIKE '_A%'"},{"l":"NULL check","c":"IS NULL / IS NOT NULL"},{"l":"Both true","c":"AND"},{"l":"Either true","c":"OR"},{"l":"Negate","c":"NOT"}]},{"type":"prac","items":["IT department ke employees dhundo","50000 se zyada salary wale","Salary 40000-60000 range mein (BETWEEN)","'R' se start hone wale names (LIKE)","NULL commission wale employees","IT ya HR mein, age 25 se zyada (AND+OR)","Exactly 4 character wale names"]}]},{"id":7,"cat":"SQL Basics","title":"ORDER BY Clause (Deep Dive)","search":"order by asc desc ascending descending sort multiple columns alias position nulls first last execution","blocks":[{"type":"sec","title":"What is ORDER BY?","items":[{"type":"prose","text":"ORDER BY sorts rows returned by a query. <strong>Without ORDER BY, Oracle does NOT guarantee the order of rows.</strong>"},{"type":"table","data":{"h":["EMP_ID","NAME","SALARY","DEPT","AGE"],"r":[["101","RAM","50000","IT","25"],["102","SHYAM","45000","HR","28"],["103","MOHAN","60000","IT","30"],["104","RAHUL","40000","SALES","24"],["105","AMAN","70000","HR","32"]]}}]},{"type":"sec","title":"Ascending Order (ASC)","items":[{"type":"prose","text":"ASC means ascending order. For numbers: 10→20→30. For strings: A→B→C. <strong>ASC is the default</strong> — Oracle assumes ASC if not specified."},{"type":"code","text":"SELECT * FROM EMPLOYEE ORDER BY SALARY;\n-- Same as:\nSELECT * FROM EMPLOYEE ORDER BY SALARY ASC;\n\n-- Output:\n-- | RAHUL | 40000 |\n-- | SHYAM | 45000 |\n-- | RAM   | 50000 |\n-- | MOHAN | 60000 |\n-- | AMAN  | 70000 |"}]},{"type":"sec","title":"Descending Order (DESC)","items":[{"type":"code","text":"SELECT * FROM EMPLOYEE ORDER BY SALARY DESC;\n-- Output (largest to smallest):\n-- | AMAN  | 70000 |\n-- | MOHAN | 60000 |\n-- | RAM   | 50000 |\n-- | SHYAM | 45000 |\n-- | RAHUL | 40000 |"}]},{"type":"sec","title":"Sorting Character Data","items":[{"type":"code","text":"-- Alphabetical (A to Z):\nSELECT NAME FROM EMPLOYEE ORDER BY NAME;\n-- AMAN, MOHAN, RAHUL, RAM, SHYAM\n\n-- Reverse (Z to A):\nSELECT NAME FROM EMPLOYEE ORDER BY NAME DESC;\n-- SHYAM, RAM, RAHUL, MOHAN, AMAN"}]},{"type":"sec","title":"Sorting Dates","items":[{"type":"code","text":"-- Oldest date first (default ASC):\nSELECT NAME, JOIN_DATE FROM EMPLOYEE ORDER BY JOIN_DATE;\n-- SHYAM (10-MAR-2024), RAM (15-JAN-2025), MOHAN (20-FEB-2026)\n\n-- Newest date first:\nSELECT NAME, JOIN_DATE FROM EMPLOYEE ORDER BY JOIN_DATE DESC;"}]},{"type":"sec","title":"Sorting by Multiple Columns","items":[{"type":"code","text":"-- Sort by DEPT first, then SALARY within each DEPT:\nSELECT * FROM EMPLOYEE ORDER BY DEPT, SALARY;\n-- | HR | SHYAM | 45000 |\n-- | HR | AMAN  | 70000 |\n-- | IT | RAM   | 50000 |\n-- | IT | MOHAN | 60000 |\n\n-- Different directions (DEPT asc, SALARY desc):\nSELECT * FROM EMPLOYEE ORDER BY DEPT ASC, SALARY DESC;\n-- | HR | AMAN  | 70000 |\n-- | HR | SHYAM | 45000 |\n-- | IT | MOHAN | 60000 |\n-- | IT | RAM   | 50000 |"}]},{"type":"sec","title":"Sorting by Column Position","items":[{"type":"code","text":"-- Sort by column number (position in SELECT list):\nSELECT EMP_ID, NAME, SALARY FROM EMPLOYEE ORDER BY 3;\n-- 1=EMP_ID, 2=NAME, 3=SALARY → sorted by SALARY\n\nSELECT EMP_ID, NAME, SALARY FROM EMPLOYEE ORDER BY 3 DESC;\n-- Not recommended: confusing if column order changes"}]},{"type":"sec","title":"Sorting by Alias","items":[{"type":"code","text":"SELECT NAME, SALARY * 12 AS annual_salary\nFROM EMPLOYEE\nORDER BY annual_salary;          -- ascending\n-- or\nORDER BY annual_salary DESC;    -- descending"}]},{"type":"sec","title":"ORDER BY with WHERE","items":[{"type":"code","text":"-- Execution flow: FROM → WHERE → SELECT → ORDER BY\nSELECT NAME, SALARY FROM EMPLOYEE\nWHERE DEPT = 'IT'\nORDER BY SALARY DESC;\n-- Step 1: IT employees: RAM(50000), MOHAN(60000)\n-- Step 2: Sort descending:\n-- | MOHAN | 60000 |\n-- | RAM   | 50000 |"}]},{"type":"sec","title":"NULL Values and ORDER BY","items":[{"type":"code","text":"-- Default Oracle behavior:\n-- ASC  order: NULL values come LAST\n-- DESC order: NULL values come FIRST\n\n-- Control NULL position:\nSELECT NAME, COMMISSION FROM EMPLOYEE\nORDER BY COMMISSION NULLS FIRST;\n-- SHYAM(NULL), MOHAN(500), RAM(1000)\n\nSELECT NAME, COMMISSION FROM EMPLOYEE\nORDER BY COMMISSION DESC NULLS LAST;\n-- RAM(1000), MOHAN(500), SHYAM(NULL)"}]},{"type":"sec","title":"Complex Example & Execution Order","items":[{"type":"code","text":"SELECT NAME, DEPT, SALARY\nFROM EMPLOYEE\nWHERE SALARY >= 45000\nORDER BY DEPT, SALARY DESC;\n-- Step 1: Filter SALARY >= 45000\n-- Step 2: Sort by DEPT asc, then SALARY desc\n-- Output:\n-- | HR | AMAN  | 70000 |\n-- | HR | SHYAM | 45000 |\n-- | IT | MOHAN | 60000 |\n-- | IT | RAM   | 50000 |\n\n-- Logical Execution Order:\n-- FROM → WHERE → SELECT → ORDER BY"}]},{"type":"rev","items":[{"l":"Ascending","c":"ORDER BY col"},{"l":"Descending","c":"ORDER BY col DESC"},{"l":"Multiple","c":"ORDER BY col1, col2"},{"l":"Different dirs","c":"col1 ASC, col2 DESC"},{"l":"By alias","c":"ORDER BY alias_name"},{"l":"By position","c":"ORDER BY 3"},{"l":"NULL first","c":"NULLS FIRST"},{"l":"NULL last","c":"NULLS LAST"},{"l":"Exec Order","c":"FROM→WHERE→SELECT→ORDER BY"}]},{"type":"prac","items":["Salary ascending sort","Name aur department descending","IT employees salary descending","Department asc, salary desc (multiple)","Annual salary descending (alias use karo)","NULL commission last mein rakhna"]}]},{"id":8,"cat":"Functions","title":"Single-Row Functions (Deep Dive)","search":"upper lower initcap length substr instr replace trim lpad rpad round trunc mod ceil floor sysdate add_months months_between next_day last_day to_char to_date to_number nested functions character number date conversion","blocks":[{"type":"sec","title":"What are Single-Row Functions?","items":[{"type":"prose","text":"Single-row functions operate on <strong>one row at a time</strong> and return <strong>one result for each row</strong>. They are divided into four categories: <strong>Character, Number, Date, and Conversion Functions.</strong>"}]},{"type":"sec","title":"1. Character Functions — UPPER, LOWER, INITCAP","items":[{"type":"table","data":{"h":["EMP_ID","NAME"],"r":[["101","ram kumar"],["102","SHYAM"],["103","mohan"]]}},{"type":"code","text":"-- UPPER(): converts to uppercase\nSELECT NAME, UPPER(NAME) FROM EMPLOYEE;\n-- | ram kumar | RAM KUMAR |\n-- | SHYAM     | SHYAM     |\n-- | mohan     | MOHAN     |\n\n-- Use Case: Case-insensitive search\nSELECT * FROM EMPLOYEE WHERE UPPER(NAME) = 'RAM KUMAR';\n-- Matches: Ram Kumar, ram kumar, RAM KUMAR — all match!\n\n-- LOWER(): converts to lowercase\nSELECT LOWER('HELLO WORLD') FROM DUAL;  -- hello world\n\n-- INITCAP(): first letter of each word uppercase\nSELECT INITCAP('ram kumar') FROM DUAL;  -- Ram Kumar"}]},{"type":"sec","title":"LENGTH, SUBSTR, INSTR","items":[{"type":"code","text":"-- LENGTH(): number of characters\nSELECT LENGTH('ORACLE') FROM DUAL;      -- 6\nSELECT NAME, LENGTH(NAME) FROM EMPLOYEE;\n\n-- SUBSTR(string, start, length): extract part of string\nSELECT SUBSTR('ORACLE DATABASE', 1, 6) FROM DUAL;  -- ORACLE\n-- O R A C L E  D A T A B A S E\n-- 1 2 3 4 5 6\n\nSELECT SUBSTR('ORACLE DATABASE', 8, 8) FROM DUAL;  -- DATABASE\n-- Starting from position 8, take 8 chars\n\n-- Negative Index (count from end):\nSELECT SUBSTR('ORACLE', -3, 3) FROM DUAL;  -- CLE\n\n-- INSTR(): find position of substring\nSELECT INSTR('ORACLE DATABASE', 'DATA') FROM DUAL;  -- 8\n-- D(DATA) starts at position 8"}]},{"type":"sec","title":"REPLACE, TRIM, LPAD, RPAD","items":[{"type":"code","text":"-- REPLACE(string, old, new):\nSELECT REPLACE('ORACLE SQL', 'SQL', 'DATABASE') FROM DUAL;\n-- ORACLE DATABASE\n\n-- TRIM(): removes leading and trailing spaces\nSELECT TRIM('   HELLO   ') FROM DUAL;  -- HELLO\n\n-- LPAD(string, total_length, pad_char): pad on LEFT\nSELECT LPAD('123', 6, '0') FROM DUAL;  -- 000123\n-- Useful for ID formatting, invoice numbers\n\n-- RPAD(string, total_length, pad_char): pad on RIGHT\nSELECT RPAD('ABC', 6, '*') FROM DUAL;  -- ABC***"}]},{"type":"sec","title":"2. Number Functions","items":[{"type":"code","text":"-- ROUND(number, decimal_places):\nSELECT ROUND(45.678, 2) FROM DUAL;  -- 45.68\nSELECT ROUND(45.673, 2) FROM DUAL;  -- 45.67\nSELECT ROUND(45.8) FROM DUAL;       -- 46 (no decimal places)\n\n-- TRUNC(number, decimal_places): CUT without rounding\nSELECT TRUNC(45.678, 2) FROM DUAL;  -- 45.67\n-- ROUND(45.678, 2) = 45.68  ← rounds\n-- TRUNC(45.678, 2) = 45.67  ← simply cuts\n\n-- MOD(number, divisor): returns remainder\nSELECT MOD(10, 3) FROM DUAL;  -- 1  (10÷3=3 remainder 1)\nSELECT MOD(10, 2) FROM DUAL;  -- 0  (even number)\n\n-- CEIL(number): round upward (ceiling)\nSELECT CEIL(4.1) FROM DUAL;   -- 5\n\n-- FLOOR(number): round downward (floor)\nSELECT FLOOR(4.9) FROM DUAL;  -- 4"}]},{"type":"sec","title":"3. Date Functions","items":[{"type":"code","text":"-- SYSDATE: current date and time\nSELECT SYSDATE FROM DUAL;  -- 21-JUN-26\n\n-- Date Arithmetic:\nSELECT SYSDATE + 5  FROM DUAL;  -- 5 days ahead\nSELECT SYSDATE - 10 FROM DUAL;  -- 10 days back\n\n-- Difference between dates:\nSELECT SYSDATE - HIRE_DATE FROM EMPLOYEE;  -- Result = number of days\n\n-- ADD_MONTHS(date, n): add/subtract months\nSELECT ADD_MONTHS(SYSDATE, 3)  FROM DUAL;  -- 3 months ahead\nSELECT ADD_MONTHS(SYSDATE, -6) FROM DUAL;  -- 6 months back\n\n-- MONTHS_BETWEEN(date1, date2): difference in months\nSELECT MONTHS_BETWEEN(\n       TO_DATE('01-JAN-2026'), TO_DATE('01-JAN-2025'))\nFROM DUAL;  -- 12\n\n-- NEXT_DAY(date, weekday): next specified weekday\nSELECT NEXT_DAY(SYSDATE, 'MONDAY') FROM DUAL;  -- Next Monday\n\n-- LAST_DAY(date): last day of the month\nSELECT LAST_DAY(SYSDATE) FROM DUAL;  -- 30-JUN-26"}]},{"type":"sec","title":"4. Conversion Functions","items":[{"type":"code","text":"-- TO_CHAR(date/number, format): convert to string\nSELECT TO_CHAR(SYSDATE, 'DD-MON-YYYY')       FROM DUAL;  -- 21-JUN-2026\nSELECT TO_CHAR(SYSDATE, 'DAY')               FROM DUAL;  -- SUNDAY\nSELECT TO_CHAR(SYSDATE, 'DD/MM/YYYY HH24:MI') FROM DUAL;  -- 21/06/2026 10:30\n\n-- Currency / number formatting:\nSELECT TO_CHAR(12345.67, '99,999.99') FROM DUAL;  -- 12,345.67\n\n-- TO_NUMBER(string): convert string to number\nSELECT TO_NUMBER('5000') FROM DUAL;  -- 5000\n\n-- TO_DATE(string, format): convert string to date\nSELECT TO_DATE('21-06-2026', 'DD-MM-YYYY') FROM DUAL;\n-- Always specify format to avoid ambiguity!"},{"type":"prose","text":"<strong>Format Codes:</strong> DD (day), MM (month number), MON (3-letter), MONTH (full name), YYYY (4-digit year), HH24 (24hr time), MI (minutes), SS (seconds)"}]},{"type":"sec","title":"Nested Functions","items":[{"type":"code","text":"-- Functions inside functions:\nSELECT UPPER(SUBSTR('oracle database', 1, 6)) FROM DUAL;\n-- Step 1: SUBSTR('oracle database', 1, 6) → 'oracle'\n-- Step 2: UPPER('oracle') → 'ORACLE'\n-- Final Output: ORACLE\n\nSELECT LENGTH(TRIM('  HELLO  ')) FROM DUAL;\n-- Step 1: TRIM('  HELLO  ') → 'HELLO'\n-- Step 2: LENGTH('HELLO') → 5\n-- Final Output: 5\n\n-- Practical example:\nSELECT INITCAP(NAME),\n       ROUND(SALARY, 2),\n       MONTHS_BETWEEN(SYSDATE, HIRE_DATE)\nFROM EMPLOYEE;"}]},{"type":"rev","items":[{"l":"UPPER/LOWER","c":"Case convert"},{"l":"INITCAP","c":"Capitalize each word"},{"l":"LENGTH","c":"String length"},{"l":"SUBSTR(s,p,l)","c":"Part extract"},{"l":"INSTR(s,srch)","c":"Find position"},{"l":"REPLACE(s,o,n)","c":"Replace text"},{"l":"TRIM","c":"Remove spaces"},{"l":"LPAD/RPAD","c":"Padding"},{"l":"ROUND(n,d)","c":"Round decimal"},{"l":"TRUNC(n,d)","c":"Cut decimal"},{"l":"MOD(n,d)","c":"Remainder"},{"l":"CEIL/FLOOR","c":"Round up/down"},{"l":"SYSDATE","c":"Current date+time"},{"l":"ADD_MONTHS","c":"Add/sub months"},{"l":"MONTHS_BETWEEN","c":"Month difference"},{"l":"LAST_DAY","c":"Last of month"},{"l":"TO_CHAR","c":"Date/Num → String"},{"l":"TO_DATE","c":"String → Date"},{"l":"TO_NUMBER","c":"String → Number"}]},{"type":"prac","items":["Employee names uppercase mein","Naam ki length nikalo","Pehle 3 characters extract karo (SUBSTR)","Salary 1 decimal pe round karo","Current date DD-MM-YYYY format mein","6 months baad ki date","'SQL' ko 'DATABASE' se replace karo","NESTED: UPPER(SUBSTR(...)) try karo","TRIM ke baad LENGTH nikalo"]}]},{"id":9,"cat":"Functions","title":"Group Functions (Aggregate Functions)","search":"count sum avg min max group function aggregate null where distinct single row difference","blocks":[{"type":"sec","title":"What are Group Functions?","items":[{"type":"prose","text":"Group Functions <strong>operate on multiple rows</strong> and return <strong>a single value</strong>. They are heavily used in reports, dashboards, analytics, and interviews."},{"type":"table","data":{"h":["EMP_ID","NAME","DEPT","SALARY","COMMISSION"],"r":[["101","RAM","IT","50000","1000"],["102","SHYAM","HR","45000","NULL"],["103","MOHAN","IT","60000","2000"],["104","RAHUL","SALES","40000","NULL"],["105","AMAN","HR","70000","3000"]]}}]},{"type":"sec","title":"Difference: Single-Row vs Group Functions","items":[{"type":"code","text":"-- Single-Row: applied to each row separately → one output per row\nSELECT UPPER(NAME) FROM EMPLOYEE;\n-- RAM, SHYAM, MOHAN, RAHUL, AMAN  (5 results)\n\n-- Group Function: applied to all rows → ONE result\nSELECT SUM(SALARY) FROM EMPLOYEE;\n-- 265000  (1 result)"}]},{"type":"sec","title":"COUNT()","items":[{"type":"code","text":"-- COUNT(*): count ALL rows (including NULL)\nSELECT COUNT(*) FROM EMPLOYEE;  -- 5\n\n-- COUNT(column): count NON-NULL values only\nSELECT COUNT(COMMISSION) FROM EMPLOYEE;\n-- COMMISSION: 1000, NULL, 2000, NULL, 3000\n-- NULL values are IGNORED → Result: 3\n\n-- COUNT(DISTINCT column): count unique values\nSELECT COUNT(DISTINCT DEPT) FROM EMPLOYEE;\n-- Departments: IT, HR, IT, SALES, HR → Unique: IT, HR, SALES\n-- Result: 3"}]},{"type":"sec","title":"SUM()","items":[{"type":"code","text":"-- SUM(): adds all values (NULL ignored)\nSELECT SUM(SALARY) FROM EMPLOYEE;\n-- 50000+45000+60000+40000+70000 = 265000"}]},{"type":"sec","title":"AVG()","items":[{"type":"code","text":"-- AVG(): average value (NULL values ignored!)\nSELECT AVG(SALARY) FROM EMPLOYEE;\n-- 265000 / 5 = 53000\n\n-- With rounding:\nSELECT ROUND(AVG(SALARY), 2) FROM EMPLOYEE;  -- 53000.00\n\n-- WARNING: AVG(COMMISSION):\n-- COMMISSION: 1000, NULL, 2000, NULL, 3000\n-- SUM = 6000, Count(non-null) = 3\n-- AVG = 6000/3 = 2000  (NOT 6000/5!)"}]},{"type":"sec","title":"MAX() and MIN()","items":[{"type":"code","text":"-- MAX(): largest value\nSELECT MAX(SALARY) FROM EMPLOYEE;  -- 70000\nSELECT MAX(NAME)   FROM EMPLOYEE;  -- SHYAM (alphabetically greatest)\n\n-- MIN(): smallest value\nSELECT MIN(SALARY) FROM EMPLOYEE;  -- 40000\nSELECT MIN(NAME)   FROM EMPLOYEE;  -- AMAN (alphabetically smallest)\n\n-- Dates:\nSELECT MAX(HIRE_DATE) FROM EMPLOYEE;  -- Latest hire date\nSELECT MIN(HIRE_DATE) FROM EMPLOYEE;  -- Earliest hire date"}]},{"type":"sec","title":"Aggregate Functions Ignore NULL","items":[{"type":"code","text":"-- COMMISSION values: 1000, NULL, 2000, NULL, 3000\nSELECT SUM(COMMISSION)   FROM EMPLOYEE;  -- 6000  (NULL ignored)\nSELECT AVG(COMMISSION)   FROM EMPLOYEE;  -- 2000  (6000/3, not /5!)\nSELECT COUNT(COMMISSION) FROM EMPLOYEE;  -- 3     (NULL ignored)\nSELECT MAX(COMMISSION)   FROM EMPLOYEE;  -- 3000"},{"type":"warn","text":"AVG(COMMISSION) divides by <strong>count of non-NULL values</strong>, not total rows!"}]},{"type":"sec","title":"Using WHERE with Group Functions","items":[{"type":"code","text":"-- Average salary of IT employees only:\nSELECT AVG(SALARY) FROM EMPLOYEE WHERE DEPT = 'IT';\n-- IT salaries: 50000, 60000\n-- Average: 55000"}]},{"type":"sec","title":"Combining Multiple Aggregate Functions","items":[{"type":"code","text":"SELECT\n    COUNT(*) AS total_employees,\n    SUM(SALARY) AS total_salary,\n    ROUND(AVG(SALARY), 2) AS avg_salary,\n    MAX(SALARY) AS highest,\n    MIN(SALARY) AS lowest\nFROM EMPLOYEE;\n\n-- Output:\n-- | 5 | 265000 | 53000 | 70000 | 40000 |"}]},{"type":"sec","title":"DISTINCT with AVG","items":[{"type":"code","text":"-- Suppose salaries: 50000, 50000, 60000, 70000\n\n-- Normal AVG:\nSELECT AVG(SALARY) FROM EMPLOYEE;\n-- (50000+50000+60000+70000)/4 = 57500\n\n-- DISTINCT AVG:\nSELECT AVG(DISTINCT SALARY) FROM EMPLOYEE;\n-- Distinct: 50000, 60000, 70000\n-- (50000+60000+70000)/3 = 60000"}]},{"type":"sec","title":"Execution Order","items":[{"type":"code","text":"-- Order: FROM → WHERE → Aggregate → SELECT\nSELECT AVG(SALARY) FROM EMPLOYEE WHERE DEPT = 'HR';\n-- Step 1: Read EMPLOYEE table\n-- Step 2: Filter DEPT='HR' rows\n-- Step 3: Compute AVG\n-- Step 4: Display result"}]},{"type":"rev","items":[{"l":"All rows","c":"COUNT(*)"},{"l":"Non-NULL count","c":"COUNT(column)"},{"l":"Total","c":"SUM(column)"},{"l":"Average","c":"AVG(column)"},{"l":"Largest","c":"MAX(column)"},{"l":"Smallest","c":"MIN(column)"},{"l":"NULL","c":"Ignored by SUM AVG COUNT(col)"},{"l":"Unique","c":"COUNT(DISTINCT col)"}]},{"type":"prac","items":["Total employees count","Highest salary","Average salary","Total commission paid (NULL ignore karo)","Commission wale employees count","IT employees ka lowest salary","HR employees ka average salary","Distinct departments count"]}]},{"id":10,"cat":"Functions","title":"GROUP BY and HAVING Clause (Deep Dive)","search":"group by having where vs aggregate function count sum avg department wise report execution order error","blocks":[{"type":"sec","title":"Why GROUP BY?","items":[{"type":"table","data":{"h":["EMP_ID","NAME","DEPT","SALARY","COMMISSION"],"r":[["101","RAM","IT","50000","1000"],["102","SHYAM","HR","45000","NULL"],["103","MOHAN","IT","60000","2000"],["104","RAHUL","SALES","40000","NULL"],["105","AMAN","HR","70000","3000"],["106","RAVI","IT","55000","1000"]]}},{"type":"prose","text":"Without GROUP BY, SUM(SALARY) gives the total for ALL employees. But suppose we want: total salary department-wise, average salary department-wise, number of employees per department — that is where GROUP BY comes in."}]},{"type":"sec","title":"GROUP BY Syntax","items":[{"type":"code","text":"-- Syntax:\nSELECT group_column, aggregate_function(column)\nFROM table_name\nGROUP BY group_column;"}]},{"type":"sec","title":"Department-wise Aggregations","items":[{"type":"code","text":"-- Total salary department-wise:\nSELECT DEPT, SUM(SALARY)\nFROM EMPLOYEE\nGROUP BY DEPT;\n-- | DEPT  | SUM(SALARY) |\n-- | IT    | 165000      |  (50000+60000+55000)\n-- | HR    | 115000      |  (45000+70000)\n-- | SALES |  40000      |\n\n-- Employee count department-wise:\nSELECT DEPT, COUNT(*)\nFROM EMPLOYEE GROUP BY DEPT;\n-- | IT | 3 |  | HR | 2 |  | SALES | 1 |\n\n-- Average salary:\nSELECT DEPT, ROUND(AVG(SALARY), 2)\nFROM EMPLOYEE GROUP BY DEPT;\n\n-- Min and Max:\nSELECT DEPT, MAX(SALARY), MIN(SALARY)\nFROM EMPLOYEE GROUP BY DEPT;"}]},{"type":"sec","title":"IMPORTANT RULE","items":[{"type":"err","text":"Every column in SELECT must EITHER be in GROUP BY OR inside an aggregate function!"},{"type":"code","text":"-- WRONG (error!):\nSELECT NAME, DEPT, SUM(SALARY)  -- NAME is not in GROUP BY!\nFROM EMPLOYEE\nGROUP BY DEPT;\n-- Error: ORA-00979: not a GROUP BY expression\n-- Oracle doesn't know which NAME to show for multiple employees in same DEPT\n\n-- CORRECT:\nSELECT DEPT, SUM(SALARY)\nFROM EMPLOYEE\nGROUP BY DEPT;"}]},{"type":"sec","title":"Multiple Columns in GROUP BY","items":[{"type":"code","text":"-- Group by DEPT and JOB:\nSELECT DEPT, JOB, SUM(SALARY)\nFROM EMPLOYEE\nGROUP BY DEPT, JOB;\n\n-- Example:\n-- | IT | DEV     | 50000  |\n-- | IT | TESTER  | 60000  |\n-- | HR | MANAGER | 115000 |\n-- First grouped by DEPT, then by JOB within each DEPT"}]},{"type":"sec","title":"WHERE with GROUP BY","items":[{"type":"code","text":"-- Filter rows FIRST (WHERE), then GROUP:\nSELECT DEPT, AVG(SALARY)\nFROM EMPLOYEE\nWHERE DEPT IN ('IT','HR')  -- Step 1: filter rows\nGROUP BY DEPT;              -- Step 2: form groups\n\n-- Output:\n-- | IT | 55000 |\n-- | HR | 57500 |"}]},{"type":"sec","title":"HAVING Clause — Filter Groups","items":[{"type":"prose","text":"HAVING filters <strong>groups</strong>. Syntax: similar to WHERE, but for groups."},{"type":"code","text":"-- Departments whose total salary exceeds 100000:\nSELECT DEPT, SUM(SALARY)\nFROM EMPLOYEE\nGROUP BY DEPT\nHAVING SUM(SALARY) > 100000;\n-- | IT | 165000 |\n-- | HR | 115000 |\n-- SALES (40000) removed!\n\n-- Departments with more than 2 employees:\nSELECT DEPT, COUNT(*)\nFROM EMPLOYEE\nGROUP BY DEPT\nHAVING COUNT(*) > 2;\n-- | IT | 3 |"}]},{"type":"sec","title":"WHERE vs HAVING","items":[{"type":"code","text":"-- WHERE: filters ROWS (before grouping)\nSELECT DEPT, AVG(SALARY) FROM EMPLOYEE\nWHERE SALARY > 40000      -- individual rows filter\nGROUP BY DEPT;\n\n-- HAVING: filters GROUPS (after grouping)\nSELECT DEPT, AVG(SALARY) FROM EMPLOYEE\nGROUP BY DEPT\nHAVING AVG(SALARY) > 50000;  -- group filter\n\n-- Cannot use aggregate in WHERE:\n-- WHERE AVG(SALARY) > 50000  ← ERROR!\n-- Use HAVING instead"},{"type":"table","data":{"h":["Feature","WHERE","HAVING"],"r":[["Filters","Individual rows","Groups"],["Used with","Simple conditions","Aggregate functions"],["Position","Before GROUP BY","After GROUP BY"],["Aggregate allowed?","No","Yes"]]}}]},{"type":"sec","title":"Complete Example & Execution Order","items":[{"type":"code","text":"SELECT DEPT,\n       COUNT(*) AS total_emp,\n       SUM(SALARY) AS total_salary,\n       ROUND(AVG(SALARY),2) AS avg_salary\nFROM EMPLOYEE\nWHERE SALARY >= 45000           -- Step 1: filter rows\nGROUP BY DEPT                   -- Step 2: form groups\nHAVING COUNT(*) >= 2            -- Step 3: filter groups\nORDER BY avg_salary DESC;       -- Step 4: sort\n\n-- Output:\n-- | DEPT | TOTAL_EMP | TOTAL_SALARY | AVG_SALARY |\n-- | HR   | 2         | 115000       | 57500      |\n-- | IT   | 3         | 165000       | 55000      |\n\n-- Complete Execution Order:\n-- FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY"}]},{"type":"rev","items":[{"l":"Group data","c":"GROUP BY column"},{"l":"Filter rows","c":"WHERE condition"},{"l":"Filter groups","c":"HAVING agg_condition"},{"l":"Exec Order","c":"FROM→WHERE→GROUP BY→HAVING→SELECT→ORDER BY"},{"l":"ORA-00979","c":"Column not in GROUP BY"}]},{"type":"prac","items":["Total salary department-wise","Average salary department-wise","2+ employees wale departments (HAVING)","Average salary 50000+ wale departments","Har department ka max salary","Total commission department-wise","Total salary 150000+ wale departments","Employee count descending sort"]}]},{"id":11,"cat":"JOINs","title":"JOINS (Deep Dive)","search":"join inner outer left right full self cross natural equi non-equi using cartesian table alias ambiguous","blocks":[{"type":"sec","title":"Why Do We Need Joins?","items":[{"type":"table","data":{"h":["EMP_ID","NAME","DEPT_ID"],"r":[["101","RAM","10"],["102","SHYAM","20"],["103","MOHAN","10"],["104","RAHUL","30"]]}},{"type":"table","data":{"h":["DEPT_ID","DEPT_NAME"],"r":[["10","IT"],["20","HR"],["30","SALES"],["40","MARKETING"]]}},{"type":"prose","text":"We want: NAME + DEPT_NAME together. But department name is not in EMPLOYEE table. Therefore, we <strong>join</strong> the two tables."}]},{"type":"sec","title":"Cartesian Product & CROSS JOIN","items":[{"type":"code","text":"-- Without join condition → Cartesian Product:\nSELECT * FROM EMPLOYEE, DEPARTMENT;\n-- 4 × 4 = 16 rows! (every employee with every dept)\n-- This is WRONG unless intended!\n\n-- CROSS JOIN (ANSI syntax):\nSELECT * FROM EMPLOYEE CROSS JOIN DEPARTMENT;\n-- Same 16 rows — usually avoided"}]},{"type":"sec","title":"INNER JOIN — Matching Rows Only","items":[{"type":"code","text":"-- ANSI syntax (recommended):\nSELECT E.NAME, D.DEPT_NAME\nFROM EMPLOYEE E\nINNER JOIN DEPARTMENT D\nON E.DEPT_ID = D.DEPT_ID;\n-- Output:\n-- | RAM   | IT    |\n-- | SHYAM | HR    |\n-- | MOHAN | IT    |\n-- | RAHUL | SALES |\n-- MARKETING (no employees) → NOT included\n\n-- Table Aliases: E = EMPLOYEE, D = DEPARTMENT\n-- Aliases make queries shorter and easier to read"}]},{"type":"sec","title":"Equi Join (Oracle Old Syntax)","items":[{"type":"code","text":"-- Oracle old syntax (uses WHERE, comma-separated tables):\nSELECT E.NAME, D.DEPT_NAME\nFROM EMPLOYEE E, DEPARTMENT D\nWHERE E.DEPT_ID = D.DEPT_ID;\n-- Same result as INNER JOIN\n-- Uses = operator (hence 'Equi' join)"}]},{"type":"sec","title":"Non-Equi Join","items":[{"type":"prose","text":"Uses operators <strong>other than =</strong> (BETWEEN, >, <, etc.)"},{"type":"table","data":{"h":["NAME","SALARY"],"r":[["RAM","50000"],["SHYAM","70000"]]}},{"type":"table","data":{"h":["GRADE","MIN_SAL","MAX_SAL"],"r":[["A","0","30000"],["B","30001","60000"],["C","60001","90000"]]}},{"type":"code","text":"SELECT E.NAME, E.SALARY, G.GRADE\nFROM EMPLOYEE E, GRADE G\nWHERE E.SALARY BETWEEN G.MIN_SAL AND G.MAX_SAL;\n-- | RAM   | 50000 | B |\n-- | SHYAM | 70000 | C |"}]},{"type":"sec","title":"SELF JOIN","items":[{"type":"prose","text":"Joining a table <strong>with itself</strong>. Useful for hierarchical data like employee-manager."},{"type":"table","data":{"h":["EMP_ID","NAME","MANAGER_ID"],"r":[["101","RAM","103"],["102","SHYAM","103"],["103","MOHAN","NULL"]]}},{"type":"code","text":"-- MOHAN is manager of RAM and SHYAM\nSELECT E.NAME AS employee, M.NAME AS manager\nFROM EMPLOYEE E, EMPLOYEE M\nWHERE E.MANAGER_ID = M.EMP_ID;\n-- | RAM   | MOHAN |\n-- | SHYAM | MOHAN |\n-- Same table used twice with different aliases!"}]},{"type":"sec","title":"NATURAL JOIN & USING Clause","items":[{"type":"code","text":"-- NATURAL JOIN: Oracle auto-joins on common column names\nSELECT * FROM EMPLOYEE NATURAL JOIN DEPARTMENT;\n-- Since both have DEPT_ID, joins on that\n-- AVOID: column rename can silently break query!\n\n-- USING clause (cleaner alternative to ON):\nSELECT NAME, DEPT_NAME\nFROM EMPLOYEE JOIN DEPARTMENT USING (DEPT_ID);\n-- Cleaner than: ON E.DEPT_ID = D.DEPT_ID"}]},{"type":"sec","title":"LEFT OUTER JOIN","items":[{"type":"prose","text":"Returns: ALL rows from left table + matching rows from right table. NULL when no match in right table."},{"type":"code","text":"-- Suppose MOHAN's DEPT_ID = 50 (does not exist in DEPT table)\nSELECT E.NAME, D.DEPT_NAME\nFROM EMPLOYEE E\nLEFT OUTER JOIN DEPARTMENT D\nON E.DEPT_ID = D.DEPT_ID;\n-- | RAM   | IT   |\n-- | SHYAM | HR   |\n-- | MOHAN | NULL |  ← MOHAN preserved (left table)\n-- MOHAN is kept even though DEPT_ID 50 doesn't exist"}]},{"type":"sec","title":"RIGHT OUTER JOIN","items":[{"type":"code","text":"-- Returns all rows from RIGHT table\nSELECT E.NAME, D.DEPT_NAME\nFROM EMPLOYEE E\nRIGHT OUTER JOIN DEPARTMENT D\nON E.DEPT_ID = D.DEPT_ID;\n-- | RAM   | IT        |\n-- | SHYAM | HR        |\n-- | NULL  | MARKETING |  ← MARKETING preserved (right table)\n-- Department with no employee also shown"}]},{"type":"sec","title":"FULL OUTER JOIN","items":[{"type":"code","text":"-- Returns ALL rows from BOTH tables\nSELECT E.NAME, D.DEPT_NAME\nFROM EMPLOYEE E\nFULL OUTER JOIN DEPARTMENT D\nON E.DEPT_ID = D.DEPT_ID;\n-- | RAM   | IT        |\n-- | SHYAM | HR        |\n-- | MOHAN | NULL      |  ← unmatched from left\n-- | NULL  | MARKETING |  ← unmatched from right"}]},{"type":"sec","title":"Oracle Old Outer Join Syntax (+)","items":[{"type":"code","text":"-- Oracle old syntax using (+):\n-- (+) is placed on the OPTIONAL side\n\n-- LEFT OUTER JOIN:\nSELECT E.NAME, D.DEPT_NAME\nFROM EMPLOYEE E, DEPARTMENT D\nWHERE E.DEPT_ID = D.DEPT_ID(+);\n-- (+) on right side = LEFT JOIN\n\n-- RIGHT OUTER JOIN:\nWHERE E.DEPT_ID(+) = D.DEPT_ID;\n-- (+) on left side = RIGHT JOIN\n-- Note: ANSI syntax is preferred over old (+) syntax"}]},{"type":"sec","title":"Multiple Table Join","items":[{"type":"code","text":"-- EMPLOYEE → DEPARTMENT → LOCATION\nSELECT E.NAME, D.DEPT_NAME, L.CITY\nFROM EMPLOYEE E\nJOIN DEPARTMENT D ON E.DEPT_ID = D.DEPT_ID\nJOIN LOCATION   L ON D.LOCATION_ID = L.LOCATION_ID;\n-- | RAM | IT | DELHI |"}]},{"type":"sec","title":"Common Errors","items":[{"type":"err","text":"Ambiguous Column: if both tables have same column name, specify table alias. ORA-00918: column ambiguously defined"},{"type":"code","text":"-- WRONG:\nSELECT DEPT_ID  -- which table?\nFROM EMPLOYEE E JOIN DEPARTMENT D ON E.DEPT_ID = D.DEPT_ID;\n\n-- CORRECT:\nSELECT E.DEPT_ID  -- from EMPLOYEE\nFROM EMPLOYEE E JOIN DEPARTMENT D ON E.DEPT_ID = D.DEPT_ID;"}]},{"type":"sec","title":"Execution Order with JOINs","items":[{"type":"code","text":"-- Logical execution order:\n-- FROM → JOIN → ON → WHERE → GROUP BY → HAVING → SELECT → ORDER BY"}]},{"type":"rev","items":[{"l":"INNER JOIN","c":"Matching rows only"},{"l":"LEFT JOIN","c":"All from left"},{"l":"RIGHT JOIN","c":"All from right"},{"l":"FULL JOIN","c":"All from both"},{"l":"SELF JOIN","c":"Table joins itself"},{"l":"NON-EQUI","c":"BETWEEN, >, <"},{"l":"NATURAL JOIN","c":"Auto match column"},{"l":"USING","c":"USING (col)"},{"l":"Old syntax","c":"WHERE E.id = D.id(+)"}]},{"type":"prac","items":["Employee names with department names (INNER JOIN)","SELF JOIN se employee aur manager","NON-EQUI JOIN se salary grades","Khaali departments (no employees) → RIGHT JOIN","Sab employees even if dept nahi → LEFT JOIN","3 tables join: EMPLOYEE → DEPT → LOCATION","Both ANSI and old Oracle syntax likhna","Ambiguous column error fix karna"]}]},{"id":12,"cat":"Advanced SQL","title":"Subqueries (Deep Dive)","search":"subquery single row multi row correlated exists not exists scalar nested in any all having inner outer query","blocks":[{"type":"sec","title":"What is a Subquery?","items":[{"type":"prose","text":"A subquery is a <strong>query nested inside another SQL query</strong>. The inner query executes first, and its result is passed to the outer query."},{"type":"code","text":"-- General syntax:\nSELECT column_name\nFROM table_name\nWHERE column_name operator\n(\n    SELECT column_name\n    FROM another_table\n);"},{"type":"table","data":{"h":["EMP_ID","NAME","SALARY","DEPT_ID"],"r":[["101","RAM","50000","10"],["102","SHYAM","45000","20"],["103","MOHAN","70000","10"],["104","RAHUL","40000","30"],["105","AMAN","80000","20"]]}}]},{"type":"sec","title":"Single-Row Subquery","items":[{"type":"prose","text":"Returns <strong>only one value</strong>. Use with: =, &gt;, &lt;, &gt;=, &lt;=, &lt;&gt;"},{"type":"code","text":"-- Find employees whose salary > average salary:\nSELECT NAME, SALARY FROM EMPLOYEE\nWHERE SALARY > (SELECT AVG(SALARY) FROM EMPLOYEE);\n\n-- Execution:\n-- Step 1: SELECT AVG(SALARY) FROM EMPLOYEE → 57000\n-- Step 2: SELECT NAME, SALARY FROM EMPLOYEE WHERE SALARY > 57000\n-- Output: | MOHAN | 70000 |  | AMAN | 80000 |\n\n-- Employee with highest salary:\nSELECT * FROM EMPLOYEE\nWHERE SALARY = (SELECT MAX(SALARY) FROM EMPLOYEE);\n-- Step 1: MAX = 80000\n-- Step 2: WHERE SALARY = 80000\n-- Output: | AMAN | 80000 |"}]},{"type":"sec","title":"Multi-Row Subquery — IN, ANY, ALL","items":[{"type":"code","text":"-- IN: works when inner query returns multiple rows\nSELECT NAME FROM EMPLOYEE\nWHERE DEPT_ID IN\n(\n    SELECT DEPT_ID FROM DEPARTMENT\n);\n-- DEPARTMENT DEPT_IDs: 10, 20\n-- Equivalent to: WHERE DEPT_ID IN (10, 20)\n\n-- WRONG — using = with multi-row:\nSELECT * FROM EMPLOYEE WHERE DEPT_ID =\n    (SELECT DEPT_ID FROM DEPARTMENT);  -- ERROR!\n-- ORA-01427: single-row subquery returns more than one row"},{"type":"code","text":"-- ANY: greater than at least one value\nSELECT * FROM EMPLOYEE\nWHERE SALARY > ANY\n(\n    SELECT SALARY FROM EMPLOYEE WHERE DEPT_ID = 10\n);\n-- Dept 10 salaries: 50000, 70000\n-- Condition: SALARY > 50000 (minimum of dept 10)\n-- Matches: MOHAN(70000), AMAN(80000)\n\n-- ALL: greater than ALL values\nSELECT * FROM EMPLOYEE\nWHERE SALARY > ALL\n(\n    SELECT SALARY FROM EMPLOYEE WHERE DEPT_ID = 10\n);\n-- Condition: SALARY > 70000 (maximum of dept 10)\n-- Matches: AMAN(80000)"}]},{"type":"sec","title":"EXISTS and NOT EXISTS","items":[{"type":"code","text":"-- EXISTS: check if subquery returns at least one row\nSELECT * FROM EMPLOYEE E\nWHERE EXISTS\n(\n    SELECT * FROM DEPARTMENT D\n    WHERE D.DEPT_ID = E.DEPT_ID\n);\n-- Employees whose department exists in DEPARTMENT table\n\n-- NOT EXISTS: check if subquery returns nothing\nSELECT * FROM CUSTOMERS C\nWHERE NOT EXISTS\n(\n    SELECT 1 FROM ORDERS O\n    WHERE O.CUSTOMER_ID = C.CUSTOMER_ID\n);\n-- Customers who have NEVER placed an order\n\n-- EXISTS vs IN: EXISTS is faster for large datasets\n-- EXISTS stops at first match; IN checks all values"}]},{"type":"sec","title":"Correlated Subquery","items":[{"type":"prose","text":"The inner query <strong>depends on the outer query</strong>. Executes row by row."},{"type":"code","text":"-- Find employees earning above THEIR OWN DEPARTMENT average:\nSELECT NAME, SALARY, DEPT_ID\nFROM EMPLOYEE E1\nWHERE SALARY >\n(\n    SELECT AVG(SALARY)\n    FROM EMPLOYEE E2\n    WHERE E2.DEPT_ID = E1.DEPT_ID  -- connects to outer query!\n);\n\n-- Department 10: AVG = (50000+70000)/2 = 60000\n--   MOHAN: 70000 > 60000 → Selected\n-- Department 20: AVG = (45000+80000)/2 = 62500\n--   AMAN:  80000 > 62500 → Selected\n-- Output: | MOHAN | 70000 |  | AMAN | 80000 |"}]},{"type":"sec","title":"Scalar Subquery","items":[{"type":"prose","text":"Returns <strong>exactly one value</strong> and can appear inside SELECT."},{"type":"code","text":"SELECT NAME, SALARY,\n       (SELECT AVG(SALARY) FROM EMPLOYEE) AS avg_salary\nFROM EMPLOYEE;\n-- | RAM   | 50000 | 57000 |\n-- | SHYAM | 45000 | 57000 |\n-- | MOHAN | 70000 | 57000 |\n-- Company average shown for each row"}]},{"type":"sec","title":"Nested Subqueries (3 Levels)","items":[{"type":"code","text":"SELECT NAME FROM EMPLOYEE\nWHERE DEPT_ID =\n(\n    SELECT DEPT_ID FROM DEPARTMENT\n    WHERE LOCATION_ID =\n    (\n        SELECT LOCATION_ID FROM LOCATION\n        WHERE CITY = 'DELHI'\n    )\n);\n-- Execution:\n-- 1. LOCATION query: DELHI ka location_id\n-- 2. DEPARTMENT query: us location ka dept\n-- 3. EMPLOYEE query: us dept ke employees"}]},{"type":"sec","title":"Subquery with HAVING","items":[{"type":"code","text":"-- Departments whose avg salary > company avg:\nSELECT DEPT_ID, AVG(SALARY)\nFROM EMPLOYEE\nGROUP BY DEPT_ID\nHAVING AVG(SALARY) >\n(\n    SELECT AVG(SALARY) FROM EMPLOYEE\n);"}]},{"type":"sec","title":"Subquery vs JOIN","items":[{"type":"code","text":"-- Subquery approach:\nSELECT NAME FROM EMPLOYEE\nWHERE DEPT_ID = (\n    SELECT DEPT_ID FROM DEPARTMENT WHERE DEPT_NAME = 'IT'\n);\n\n-- JOIN approach (same result):\nSELECT E.NAME FROM EMPLOYEE E\nJOIN DEPARTMENT D ON E.DEPT_ID = D.DEPT_ID\nWHERE D.DEPT_NAME = 'IT';\n\n-- Both produce same result.\n-- JOINs are usually preferred for readability and performance."}]},{"type":"rev","items":[{"l":"Single-row ops","c":"= > < >= <="},{"l":"Multi-row","c":"IN / ANY / ALL"},{"l":"Existence","c":"EXISTS / NOT EXISTS"},{"l":"Correlated","c":"Inner uses outer col"},{"l":"Scalar","c":"Returns 1 value in SELECT"},{"l":"Multi-table","c":"Nested 3 levels"}]},{"type":"prac","items":["Average se zyada salary wale","Maximum salary wala employee","IT aur HR employees (IN subquery)","Dept 10 sab salaries se zyada (ALL)","Apne dept average se zyada (Correlated)","Orders nahi kiye wale customers (NOT EXISTS)","Dept avg > company avg (HAVING + subquery)","Subquery vs JOIN compare karo"]}]},{"id":13,"cat":"Advanced SQL","title":"Set Operators (Deep Dive)","search":"union union all intersect minus combine duplicate order by column names rules common rows","blocks":[{"type":"sec","title":"Setup Tables","items":[{"type":"table","data":{"h":["EMP_ID","NAME"],"r":[["101","RAM"],["102","SHYAM"],["103","MOHAN"],["104","RAHUL"]]}},{"type":"prose","text":"Table: EMPLOYEE_2024 (above)"},{"type":"table","data":{"h":["EMP_ID","NAME"],"r":[["103","MOHAN"],["104","RAHUL"],["105","AMAN"],["106","RAVI"]]}},{"type":"prose","text":"Table: EMPLOYEE_2025 (above)"}]},{"type":"sec","title":"Rules for Set Operators","items":[{"type":"list","items":["Number of columns must be the SAME in both queries","Data types must be compatible (NUMBER↔NUMBER, VARCHAR2↔VARCHAR2, DATE↔DATE)","ORDER BY can appear only ONCE, at the very END","Output column names come from the FIRST query"]},{"type":"code","text":"-- CORRECT (same columns):\nSELECT EMP_ID, NAME FROM EMPLOYEE_2024\nUNION\nSELECT EMP_ID, NAME FROM EMPLOYEE_2025;\n\n-- WRONG (different column count):\nSELECT EMP_ID, NAME FROM EMPLOYEE_2024\nUNION\nSELECT EMP_ID FROM EMPLOYEE_2025;  -- ERROR!"}]},{"type":"sec","title":"UNION — Combine + Remove Duplicates","items":[{"type":"code","text":"SELECT EMP_ID, NAME FROM EMPLOYEE_2024\nUNION\nSELECT EMP_ID, NAME FROM EMPLOYEE_2025;\n\n-- Table1: 101 RAM, 102 SHYAM, 103 MOHAN, 104 RAHUL\n-- Table2: 103 MOHAN, 104 RAHUL, 105 AMAN, 106 RAVI\n-- Combined: all 8 rows\n-- Duplicates removed: MOHAN and RAHUL appear once\n-- Output (6 rows):\n-- 101 RAM, 102 SHYAM, 103 MOHAN, 104 RAHUL, 105 AMAN, 106 RAVI"}]},{"type":"sec","title":"UNION ALL — Combine + Keep Duplicates","items":[{"type":"code","text":"SELECT EMP_ID, NAME FROM EMPLOYEE_2024\nUNION ALL\nSELECT EMP_ID, NAME FROM EMPLOYEE_2025;\n\n-- Output (8 rows — duplicates included):\n-- 101 RAM, 102 SHYAM, 103 MOHAN, 104 RAHUL\n-- 103 MOHAN, 104 RAHUL, 105 AMAN, 106 RAVI\n-- MOHAN and RAHUL appear TWICE"},{"type":"info","text":"<strong>Performance:</strong> UNION ALL is FASTER than UNION because Oracle does not spend time removing duplicates."}]},{"type":"sec","title":"INTERSECT — Common Rows Only","items":[{"type":"code","text":"SELECT EMP_ID, NAME FROM EMPLOYEE_2024\nINTERSECT\nSELECT EMP_ID, NAME FROM EMPLOYEE_2025;\n\n-- Only rows present in BOTH tables:\n-- | 103 | MOHAN |\n-- | 104 | RAHUL |"}]},{"type":"sec","title":"MINUS — First Minus Second","items":[{"type":"code","text":"-- Rows in first query but NOT in second:\nSELECT EMP_ID, NAME FROM EMPLOYEE_2024\nMINUS\nSELECT EMP_ID, NAME FROM EMPLOYEE_2025;\n-- MOHAN and RAHUL removed (exist in both)\n-- Output:\n-- | 101 | RAM   |\n-- | 102 | SHYAM |\n\n-- Reverse (2025 MINUS 2024):\nSELECT EMP_ID, NAME FROM EMPLOYEE_2025\nMINUS\nSELECT EMP_ID, NAME FROM EMPLOYEE_2024;\n-- Output:\n-- | 105 | AMAN |\n-- | 106 | RAVI |"}]},{"type":"sec","title":"ORDER BY with Set Operators","items":[{"type":"code","text":"-- ORDER BY: only ONCE, at the very END\nSELECT EMP_ID, NAME FROM EMPLOYEE_2024\nUNION\nSELECT EMP_ID, NAME FROM EMPLOYEE_2025\nORDER BY NAME;  -- Correct: one ORDER BY at end\n\n-- WRONG (error!):\nSELECT EMP_ID, NAME FROM EMPLOYEE_2024\nORDER BY NAME    -- ERROR! Can't have ORDER BY here\nUNION\nSELECT EMP_ID, NAME FROM EMPLOYEE_2025;"}]},{"type":"sec","title":"Column Names in Output","items":[{"type":"code","text":"-- Aliases from FIRST query become output column names:\nSELECT EMP_ID AS id, NAME AS employee_name FROM EMPLOYEE_2024\nUNION\nSELECT EMP_ID, NAME FROM EMPLOYEE_2025;\n-- Output columns: id, employee_name (from first query)\n\n-- NULL values: treated as duplicates\n-- NULL UNION NULL → only one NULL appears"}]},{"type":"sec","title":"Real-World Example — Customer Analysis","items":[{"type":"code","text":"-- Setup:\n-- CURRENT_CUSTOMERS: | 1 RAM | 2 SHYAM | 3 MOHAN |\n-- OLD_CUSTOMERS:     | 3 MOHAN | 4 AMAN | 5 RAVI |\n\n-- All customers (combined):\nSELECT ID, NAME FROM CURRENT_CUSTOMERS\nUNION\nSELECT ID, NAME FROM OLD_CUSTOMERS;\n-- 1 RAM, 2 SHYAM, 3 MOHAN, 4 AMAN, 5 RAVI\n\n-- Common customers:\nSELECT ID, NAME FROM CURRENT_CUSTOMERS\nINTERSECT\nSELECT ID, NAME FROM OLD_CUSTOMERS;\n-- 3 MOHAN\n\n-- Customers who left (in old but not current):\nSELECT ID, NAME FROM OLD_CUSTOMERS\nMINUS\nSELECT ID, NAME FROM CURRENT_CUSTOMERS;\n-- 4 AMAN, 5 RAVI"}]},{"type":"rev","items":[{"l":"UNION","c":"Combine + Remove dups"},{"l":"UNION ALL","c":"Combine + Keep dups"},{"l":"INTERSECT","c":"Common rows only"},{"l":"MINUS","c":"First - Second"},{"l":"ORDER BY","c":"Once, at the very end"},{"l":"Column names","c":"From first query"},{"l":"UNION ALL","c":"Faster than UNION"}]},{"type":"prac","items":["Dono tables combine without duplicates (UNION)","Common employees (INTERSECT)","2024 mein the, 2025 mein nahi (MINUS)","2025 mein hain, 2024 mein nahi (MINUS reverse)","Name se sort karo (ORDER BY at end)","UNION vs UNION ALL rows count compare karo","Old customers jo current nahi hain"]}]},{"id":14,"cat":"DDL & Constraints","title":"DDL Commands and Constraints (Deep Dive)","search":"create alter drop
